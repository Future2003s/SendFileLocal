<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Xem trước file · LAN Share</title>
    <meta name="description" content="Xem trước và tải tệp được chia sẻ từ LAN Share." />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.ico" />
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" defer></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f0f4ff;
            --card: rgba(255, 255, 255, 0.92);
            --border: rgba(0, 0, 0, 0.06);
            --text: #1e293b;
            --muted: #64748b;
            --blue: #3b82f6;
            --blue-hover: #2563eb;
            --teal: #0d9488;
            --red: #ef4444;
            --green: #10b981;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #e8eaf6 50%, #fce4ec 100%);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 24px 16px 48px;
            color: var(--text);
        }

        /* ─── HEADER ─── */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            opacity: 0.7;
        }

        .header img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .header span {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.02em;
        }

        /* ─── CARD ─── */
        .card {
            background: var(--card);
            backdrop-filter: blur(24px);
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.07);
            width: 100%;
            max-width: 680px;
            overflow: hidden;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── FILE INFO ─── */
        .file-info {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 24px 28px 20px;
            border-bottom: 1px solid var(--border);
        }

        .file-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
        }

        .file-meta {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            word-break: break-all;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .file-size {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 8px;
            display: inline-block;
        }

        /* ─── ACTION BUTTONS ─── */
        .actions {
            display: flex;
            gap: 10px;
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--blue);
            color: #fff;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35);
        }

        .btn-primary:hover {
            background: var(--blue-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(59, 130, 246, 0.40);
        }

        .btn-ghost {
            background: #f1f5f9;
            color: var(--muted);
        }

        .btn-ghost:hover {
            background: #e2e8f0;
            color: var(--text);
        }

        /* ─── PREVIEW AREA ─── */
        .preview-area {
            min-height: 300px;
            max-height: 65vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            background: #f8fafc;
            position: relative;
        }

        .preview-area img {
            max-width: 100%;
            max-height: 65vh;
            object-fit: contain;
            display: block;
        }

        .preview-area video,
        .preview-area audio {
            max-width: 100%;
        }

        .preview-area iframe {
            width: 100%;
            height: 65vh;
            border: none;
            background: #fff;
        }

        .preview-area audio {
            width: 90%;
            max-width: 480px;
            margin: 32px auto;
        }

        /* ─── LOADING / EMPTY ─── */
        .center-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 48px 24px;
            color: var(--muted);
            text-align: center;
        }

        .center-content i {
            font-size: 52px;
            opacity: 0.4;
        }

        .center-content p {
            font-size: 15px;
            font-weight: 600;
        }

        .center-content small {
            font-size: 12px;
            opacity: 0.7;
        }

        /* spinner */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        /* ─── FOOTER NOTE ─── */
        .share-footer {
            margin-top: 18px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
            opacity: 0.7;
        }

        /* ─── NOT FOUND / ERROR ─── */
        #error-view {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 16px;
            text-align: center;
            padding: 24px;
        }

        #error-view i {
            font-size: 64px;
            color: #e2e8f0;
        }

        #error-view h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }

        #error-view p {
            font-size: 14px;
            color: var(--muted);
        }
    </style>
</head>

<body>

    <!-- Header brand -->
    <div class="header">
        <img src="/images/cloud-storage.png" alt="LAN Share" onerror="this.style.display='none'" />
        <span>LAN Share · Chia sẻ tệp</span>
    </div>

    <!-- Error state (hidden by default) -->
    <div id="error-view">
        <i class="ph-fill ph-file-x"></i>
        <h2 id="error-title">Không tìm thấy tệp</h2>
        <p id="error-msg">Tệp đã bị xóa hoặc link không hợp lệ.</p>
    </div>

    <!-- Main card -->
    <div class="card" id="main-card">
        <!-- File info -->
        <div class="file-info">
            <div class="file-icon" id="file-icon-wrap">
                <i class="spin ph ph-circle-notch" style="color:#94a3b8;font-size:28px"></i>
            </div>
            <div class="file-meta">
                <div class="file-name" id="file-name">Đang tải...</div>
                <span class="file-size" id="file-size">—</span>
            </div>
        </div>

        <!-- Action buttons -->
        <div class="actions" id="actions-bar">
            <a id="download-btn" href="#" class="btn btn-primary" download>
                <i class="ph-bold ph-download-simple"></i> Tải về
            </a>
            <button class="btn btn-ghost" onclick="history.back()">
                <i class="ph-bold ph-arrow-left"></i> Quay lại
            </button>
        </div>

        <!-- Preview area -->
        <div class="preview-area" id="preview-area">
            <div class="center-content">
                <i class="ph ph-circle-notch spin" style="font-size:38px;color:#94a3b8"></i>
                <p>Đang tải xem trước...</p>
            </div>
        </div>
    </div>

    <div class="share-footer">Xem trước không yêu cầu đăng nhập · Bấm "Tải về" để lưu tệp</div>

    <script>
        // ─── HELPERS ───────────────────────────────────────────────────────────────
        function fmt(bytes) {
            if (bytes == null) return '—';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
            return (bytes / 1073741824).toFixed(2) + ' GB';
        }

        function ext(name) {
            return (name.split('.').pop() || '').toLowerCase();
        }

        // ─── FILE TYPE CONFIG ──────────────────────────────────────────────────────
        const FILE_TYPES = {
            image: { exts: ['png', 'jpg', 'jpeg', 'webp', 'gif', 'svg', 'bmp', 'ico', 'avif'], icon: 'ph-fill ph-image', bg: '#eff6ff', color: '#3b82f6' },
            video: { exts: ['mp4', 'webm', 'ogg', 'mov', 'avi'], icon: 'ph-fill ph-video', bg: '#fdf4ff', color: '#a855f7' },
            audio: { exts: ['mp3', 'wav', 'ogg', 'flac', 'aac', 'm4a'], icon: 'ph-fill ph-music-note', bg: '#fff7ed', color: '#f97316' },
            pdf: { exts: ['pdf'], icon: 'ph-fill ph-file-pdf', bg: '#fef2f2', color: '#ef4444' },
            text: { exts: ['txt', 'md', 'json', 'js', 'css', 'html', 'csv', 'log', 'xml', 'yaml', 'yml', 'ts', 'jsx', 'tsx', 'sh', 'bat'], icon: 'ph-fill ph-file-text', bg: '#f0fdf4', color: '#22c55e' },
            zip: { exts: ['zip', 'rar', '7z', 'tar', 'gz', 'bz2'], icon: 'ph-fill ph-file-zip', bg: '#fafaf9', color: '#78716c' },
            doc: { exts: ['doc', 'docx'], icon: 'ph-fill ph-file-doc', bg: '#eff6ff', color: '#2563eb' },
            xls: { exts: ['xls', 'xlsx', 'csv'], icon: 'ph-fill ph-file-xls', bg: '#f0fdf4', color: '#16a34a' },
            ppt: { exts: ['ppt', 'pptx'], icon: 'ph-fill ph-file-ppt', bg: '#fff7ed', color: '#ea580c' },
        };

        function fileTypeOf(name) {
            const e = ext(name);
            for (const [type, cfg] of Object.entries(FILE_TYPES)) {
                if (cfg.exts.includes(e)) return { type, ...cfg };
            }
            return { type: 'other', icon: 'ph-fill ph-file', bg: '#f8fafc', color: '#94a3b8' };
        }

        // ─── INIT ──────────────────────────────────────────────────────────────────
        const params = new URLSearchParams(location.search);
        // The file name comes from the URL path: /share/<encodedName>
        const rawPath = location.pathname.replace(/^\/share\//, '');
        const encName = rawPath;
        const fileName = decodeURIComponent(encName);
        const dir = params.get('dir') || '';

        const dirQS = dir ? `?dir=${encodeURIComponent(dir)}` : '';
        const dirQSExtra = dir ? `&dir=${encodeURIComponent(dir)}` : '';
        const downloadUrl = `/download/${encName}${dirQS}`;
        const previewUrl = `/download/${encName}?preview=1${dirQSExtra}`;

        function showError(title, msg) {
            document.getElementById('main-card').style.display = 'none';
            const ev = document.getElementById('error-view');
            ev.style.display = 'flex';
            document.getElementById('error-title').textContent = title;
            document.getElementById('error-msg').textContent = msg;
        }

        async function init() {
            if (!fileName) { showError('Thiếu tên tệp', 'Link không hợp lệ.'); return; }

            // ── Set download button ──
            const dlBtn = document.getElementById('download-btn');
            dlBtn.href = downloadUrl;
            dlBtn.download = fileName;

            // ── Try to fetch file info via HEAD request ──
            let fileSize = null;
            try {
                const head = await fetch(downloadUrl, { method: 'HEAD' });
                if (!head.ok) {
                    showError('Không tìm thấy tệp', 'Tệp đã bị xóa hoặc link không còn hiệu lực.');
                    return;
                }
                const cl = head.headers.get('content-length');
                if (cl) fileSize = parseInt(cl, 10);
            } catch {
                // Network error — still try to render
            }

            // ── Update file info UI ──
            const cfg = fileTypeOf(fileName);
            document.getElementById('file-name').textContent = fileName;
            document.getElementById('file-size').textContent = fileSize != null ? fmt(fileSize) : 'Không rõ dung lượng';

            const iconWrap = document.getElementById('file-icon-wrap');
            iconWrap.style.background = cfg.bg;
            iconWrap.innerHTML = `<i class="${cfg.icon}" style="color:${cfg.color}"></i>`;

            // ── Render preview ──
            renderPreview(fileName, cfg.type);
        }

        function renderPreview(name, type) {
            const area = document.getElementById('preview-area');

            const noPreview = (label = 'Không thể xem trước tệp này', sub = 'Bấm "Tải về" để mở trên thiết bị của bạn') => {
                area.innerHTML = `<div class="center-content">
          <i class="ph-fill ph-file" style="font-size:56px;color:#cbd5e1"></i>
          <p>${label}</p>
          <small>${sub}</small>
        </div>`;
            };

            switch (type) {
                case 'image':
                    area.innerHTML = `<img src="${previewUrl}" alt="${fileName}"
            onerror="this.parentElement.innerHTML='<div class=\\'center-content\\'><i class=\\'ph-fill ph-image-broken\\' style=\\'font-size:52px;color:#cbd5e1\\'></i><p>Không thể tải ảnh</p></div>'" />`;
                    break;

                case 'video':
                    area.innerHTML = `<video src="${previewUrl}" controls style="max-width:100%;max-height:65vh">
            Trình duyệt của bạn không hỗ trợ video.
          </video>`;
                    break;

                case 'audio':
                    area.innerHTML = `<audio src="${previewUrl}" controls style="width:90%;max-width:480px;margin:40px auto;display:block">
            Trình duyệt của bạn không hỗ trợ audio.
          </audio>`;
                    break;

                case 'pdf':
                    area.innerHTML = `<iframe src="${previewUrl}" title="${fileName}"></iframe>`;
                    break;

                case 'text':
                    area.innerHTML = `<div class="center-content"><i class="ph ph-circle-notch spin" style="font-size:36px;color:#94a3b8"></i><p>Đang tải nội dung...</p></div>`;
                    fetch(previewUrl)
                        .then(r => r.text())
                        .then(text => {
                            const safe = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                            area.innerHTML = `<pre style="white-space:pre-wrap;word-break:break-all;padding:24px;font-size:13px;line-height:1.6;font-family:monospace;background:#f8fafc;width:100%;height:100%;overflow:auto;text-align:left">${safe}</pre>`;
                        })
                        .catch(() => noPreview('Không thể tải nội dung văn bản'));
                    break;

                case 'doc':
                case 'xls':
                case 'ppt':
                    noPreview('Tệp Office không hỗ trợ xem trước trực tiếp', 'Tải về để mở bằng Microsoft Office hoặc Google Docs');
                    break;

                case 'zip':
                    noPreview('Tệp nén không thể xem trước', 'Tải về và giải nén để xem nội dung');
                    break;

                default:
                    noPreview();
            }
        }

        init();
    </script>
</body>

</html>
