<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LAN Share</title>

  <!-- Preconnect CDN để giảm DNS + TLS latency cho các thư viện -->
  <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css">

  <!-- pdf.js / mammoth / xlsx được load lazy khi cần (xem lazyLoad bên dưới) -->

  <style>
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    input[type="file"] {
      display: none;
    }

    @keyframes progress-stripes {
      from {
        background-position: 1rem 0;
      }

      to {
        background-position: 0 0;
      }
    }

    .animate-progress {
      animation: progress-stripes 1s linear infinite;
      background-image: linear-gradient(45deg, rgba(255, 255, 255, .15) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, .15) 50%, rgba(255, 255, 255, .15) 75%, transparent 75%, transparent);
      background-size: 1rem 1rem;
    }

    .preview-doc-content {
      font-family: 'Times New Roman', Times, serif;
      font-size: 16px;
      line-height: 1.6;
    }

    .preview-doc-content h1 {
      font-size: 2em;
      font-weight: bold;
      margin-bottom: .5em;
    }

    .preview-doc-content h2 {
      font-size: 1.5em;
      font-weight: bold;
      margin-bottom: .5em;
    }

    .preview-doc-content p {
      margin-bottom: 1em;
    }

    .preview-doc-content table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 1em;
    }

    .preview-doc-content th {
      background-color: #f1f5f9;
      font-weight: 600;
      text-align: left;
    }

    .preview-doc-content td,
    .preview-doc-content th {
      border: 1px solid #cbd5e1;
      padding: 6px 10px;
      vertical-align: top;
    }

    .preview-doc-content ul {
      list-style-type: disc;
      margin-left: 20px;
      margin-bottom: 1em;
    }

    .preview-doc-content ol {
      list-style-type: decimal;
      margin-left: 20px;
      margin-bottom: 1em;
    }

    /* CSS cho Excel (SheetJS) */
    .preview-excel-content {
      font-size: 14px;
      line-height: 1.5;
    }

    .preview-excel-content table {
      border-collapse: collapse;
      min-width: 100%;
      margin-bottom: 1em;
      font-family: inherit;
      white-space: nowrap;
      /* Tắt tự động xuống dòng trong ô Excel */
    }

    .preview-excel-content th {
      background-color: #f8fafc;
      font-weight: 600;
      text-align: center;
      border: 1px solid #cbd5e1;
      padding: 8px 16px;
      color: #334155;
    }

    .preview-excel-content td {
      border: 1px solid #e2e8f0;
      padding: 6px 12px;
      vertical-align: middle;
      color: #1e293b;
    }

    .preview-excel-content tr:nth-child(even) {
      background-color: #f8fafc;
    }

    /* Row enter animation nhẹ */
    @keyframes row-in {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .file-row-new {
      animation: row-in .18s ease-out forwards;
    }

    /* Animation cho nút copy clipboard */
    @keyframes copy-pop {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.15);
      }

      100% {
        transform: scale(1);
      }
    }

    .animate-copy {
      animation: copy-pop 0.3s ease-out forwards;
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen p-4 md:p-8">

  <div class="max-w-4xl mx-auto space-y-6">

    <!-- HEADER -->
    <header
      class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold flex items-center gap-2 text-slate-900">
          <i class="ph ph-hard-drives text-blue-500 text-3xl"></i>
          LAN Share
        </h1>
        <p class="text-slate-500 text-sm mt-1">Chia sẻ tệp tin nội bộ nhanh chóng</p>
      </div>
      <div class="flex items-center gap-3 w-full md:w-auto">
        <div class="relative flex-1 md:w-64">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="ph ph-lock-key text-slate-400"></i>
          </div>
          <input id="pin" type="password" placeholder=""
            class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all"
            onkeyup="if(event.key==='Enter') { lastEtag=null; refresh(true); }"
            oninput="clearTimeout(_pinTimer); _pinTimer=setTimeout(()=>{ lastEtag=null; refresh(true); }, 400)" />
        </div>
        <button onclick="refresh(true)"
          class="p-2.5 bg-slate-100 text-slate-600 hover:bg-slate-200 hover:text-slate-900 rounded-xl transition-colors shrink-0"
          title="Tải lại danh sách / Xác nhận PIN">
          <i class="ph ph-arrows-clockwise text-xl"></i>
        </button>
      </div>
    </header>

    <!-- KHU VỰC KÉO THẢ UPLOAD -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
      <label id="drop" for="picker"
        class="relative flex flex-col items-center justify-center w-full h-40 border-2 border-slate-300 border-dashed rounded-xl bg-slate-50 hover:bg-blue-50 hover:border-blue-400 transition-all cursor-pointer group overflow-hidden">
        <div class="flex flex-col items-center justify-center pt-5 pb-6 transition-all duration-300">
          <div class="p-3 bg-white rounded-full shadow-sm mb-3 group-hover:scale-110 transition-transform">
            <i class="ph ph-cloud-arrow-up text-3xl text-blue-500"></i>
          </div>
          <p class="mb-2 text-sm text-slate-600 font-medium">
            <span class="text-blue-600">Nhấn để chọn file</span> hoặc kéo thả vào đây
          </p>
          <p class="text-xs text-slate-400">Hỗ trợ tải lên nhiều file cùng lúc</p>
        </div>
        <input id="picker" type="file" multiple onchange="upload()" />
      </label>

      <div id="status-container"
        class="hidden mt-4 items-center gap-3 p-3 rounded-lg text-sm font-medium transition-all duration-300">
        <i class="ph ph-spinner animate-spin text-lg"></i>
        <span id="status">Đang tải lên...</span>
      </div>
    </div>

    <!-- KHU VỰC CLIPBOARD CHUNG -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col transition-all">
      <div class="flex items-center justify-between gap-3 mb-4">
        <h2 class="font-semibold text-slate-700 flex items-center gap-2">
          <i class="ph ph-clipboard-text text-xl text-blue-500"></i>
          Clipboard chung
        </h2>
      </div>

      <!-- Ô Nhập liệu -->
      <div class="relative w-full mb-6">
        <textarea id="shared-clipboard"
          class="w-full min-h-[100px] max-h-[300px] p-4 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-sm font-mono leading-relaxed resize-y placeholder:text-slate-400"
          placeholder="Dán nội dung vào đây để chia sẻ..." onkeydown="handleClipboardKeydown(event)"
          oninput="handleClipboardInput()"></textarea>

        <div class="absolute bottom-3 right-3 flex items-center gap-2">
          <button id="btn-save-clipboard" onclick="saveClipboard()"
            class="text-xs font-medium bg-blue-500 text-white hover:bg-blue-600 py-1.5 px-3 rounded-lg flex items-center gap-1.5 transition-colors border border-blue-600 shadow-sm"
            title="Gửi (Ctrl+Enter hoặc Cmd+Enter)">
            <i class="ph ph-paper-plane-right text-sm"></i> <span>Gửi</span>
          </button>
        </div>
      </div>

      <!-- Danh sách lịch sử -->
      <div class="flex flex-col gap-3">
        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Lịch sử gần đây</h3>
        <div id="clipboard-list" class="flex flex-col gap-3 max-h-[400px] overflow-y-auto pr-2 -mr-2">
          <!-- Render thông qua JS -->
          <div class="text-center py-6 text-slate-400 text-sm italic">Đang tải dữ liệu...</div>
        </div>
      </div>
    </div>

    <!-- DANH SÁCH FILE -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
      <div class="px-6 py-4 border-b border-slate-100 bg-slate-50/50 flex flex-wrap items-center justify-between gap-3">
        <div class="flex items-center gap-3">
          <h2 class="font-semibold text-slate-700">Tệp tin đã tải lên</h2>
          <span id="file-count" class="text-xs font-medium bg-slate-200 text-slate-600 py-1 px-2.5 rounded-full">0
            file</span>
        </div>
        <div id="table-actions" class="hidden items-center gap-2">
          <span id="selected-text" class="text-sm text-slate-500 hidden mr-2"><span id="selected-count">0</span> đã
            chọn</span>
          <button id="btn-download-selected" onclick="downloadSelected()"
            class="hidden text-xs font-medium bg-blue-50 text-blue-600 hover:bg-blue-100 py-2 px-3 rounded-lg items-center gap-1 transition-colors border border-blue-100">
            <i class="ph ph-download-simple text-sm"></i> Tải chọn
          </button>
          <button id="btn-delete-selected" onclick="openDeleteSelectedModal()"
            class="hidden text-xs font-medium bg-red-50 text-red-600 hover:bg-red-100 py-2 px-3 rounded-lg items-center gap-1 transition-colors border border-red-100">
            <i class="ph ph-trash text-sm"></i> Xoá chọn
          </button>
          <button id="btn-delete-all" onclick="openDeleteAllModal()"
            class="text-xs font-medium bg-slate-100 text-slate-600 hover:bg-red-50 hover:text-red-600 hover:border-red-100 py-2 px-3 rounded-lg flex items-center gap-1 transition-colors border border-slate-200">
            <i class="ph ph-trash text-sm"></i> Xoá tất cả
          </button>
        </div>
      </div>

      <div class="overflow-x-auto min-h-[200px]">
        <table class="w-full text-left border-collapse whitespace-nowrap">
          <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider hidden md:table-header-group">
            <tr>
              <th class="px-4 py-3 font-medium w-10 text-center text-slate-400">#</th>
              <th class="px-6 py-3 font-medium w-12 text-center">
                <input type="checkbox" id="cb-select-all"
                  class="cursor-pointer w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500"
                  onchange="toggleSelectAll()">
              </th>
              <th class="px-6 py-3 font-medium">Tên File</th>
              <th class="px-6 py-3 font-medium w-32 text-right">Kích thước</th>
              <th class="px-6 py-3 font-medium w-32 text-center">Thao tác</th>
            </tr>
          </thead>
          <tbody id="list" class="divide-y divide-slate-100 text-sm">
            <!-- render bởi JS -->
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- MODAL XEM TRƯỚC -->
  <div id="preview-modal" onclick="if(event.target===this)closePreviewModal()"
    class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-slate-900/80 backdrop-blur-sm transition-all p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-4xl flex flex-col overflow-hidden h-[90vh]">
      <div class="flex items-center justify-between p-4 border-b border-slate-100 bg-slate-50 shrink-0">
        <h3 id="preview-title" class="text-lg font-bold text-slate-800 truncate pr-4" title=""></h3>
        <div class="flex items-center gap-2">
          <a id="preview-download-btn" href="#"
            class="px-4 py-2 bg-blue-500 text-white text-sm font-medium rounded-lg hover:bg-blue-600 transition-colors flex items-center gap-2">
            <i class="ph ph-download-simple text-lg"></i> Tải về
          </a>
          <button onclick="closePreviewModal()"
            class="w-10 h-10 flex items-center justify-center text-slate-500 hover:bg-slate-200 rounded-xl transition-colors">
            <i class="ph ph-x text-xl"></i>
          </button>
        </div>
      </div>
      <div id="preview-body"
        class="p-4 md:p-6 overflow-auto flex-1 bg-slate-100 flex flex-col items-center justify-center"></div>
    </div>
  </div>

  <!-- MODAL XÁC NHẬN XOÁ -->
  <div id="delete-modal"
    class="fixed inset-0 z-50 hidden flex items-center justify-center bg-slate-900/50 backdrop-blur-sm transition-all">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm mx-4 overflow-hidden">
      <div class="p-6">
        <div class="flex items-center justify-center w-12 h-12 mx-auto bg-red-100 rounded-full mb-4">
          <i class="ph ph-warning-circle text-2xl text-red-600"></i>
        </div>
        <h3 class="text-lg font-bold text-center text-slate-900 mb-2">Xác nhận xoá</h3>
        <p id="delete-message" class="text-sm text-center text-slate-500 mb-1"></p>
        <p id="delete-filename" class="text-sm font-semibold text-center text-slate-700 break-all line-clamp-2 mt-2">
        </p>
      </div>
      <div class="flex border-t border-slate-100">
        <button onclick="closeDeleteModal()"
          class="flex-1 px-4 py-3 text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors">Hủy
          bỏ</button>
        <button onclick="executeDelete()"
          class="flex-1 px-4 py-3 text-sm font-medium text-white bg-red-500 hover:bg-red-600 transition-colors border-l border-red-600/10">Xoá
          file</button>
      </div>
    </div>
  </div>

  <script>
    // ─── UTILS ────────────────────────────────────────────────────────────────
    const $ = (id) => document.getElementById(id);

    const isLocalPreview = ['blob:', 'file:', 'data:'].includes(window.location.protocol);
    let _pinTimer = null; // Dùng cho debounce auto-refresh khi gõ PIN

    // ─── LAZY LOADER ─────────────────────────────────────────────────────────
    // Chỉ inject script khi thực sự cần, tránh load ~2MB thư viện khi mở trang
    const _loaded = new Set();
    function lazyLoad(src) {
      if (_loaded.has(src)) return Promise.resolve();
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = () => { _loaded.add(src); resolve(); };
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    // ─── MOCK DATA (local preview) ────────────────────────────────────────────
    let mockFiles = isLocalPreview ? [
      { name: "báo_cáo_quý_3.pdf", size: 1048576, url: null },
      { name: "source_code_update.zip", size: 5242880, url: null },
      { name: "ảnh_banner_đẹp.png", size: 850000, url: null }
    ] : [];

    // ─── STATE ────────────────────────────────────────────────────────────────
    let currentFiles = [];
    let selectedFiles = new Set();
    let currentFilesToDelete = [];
    let lastEtag = null;          // Dùng cho conditional GET
    let _refreshTimer = null;

    // ─── PDF.js worker setup ──────────────────────────────────────────────────
    const PDFJS_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
    const PDFJS_WORKER = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    async function setupPdfWorker() {
      await lazyLoad(PDFJS_CDN);
      // pdf.js legacy CDN build exposes global as window.pdfjsLib
      const lib = window.pdfjsLib;
      if (!lib) throw new Error('pdf.js CDN failed to load');
      lib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;
      return lib;
    }

    // ─── MOCK FETCH ───────────────────────────────────────────────────────────
    async function safeFetch(path, options = {}) {
      if (isLocalPreview) {
        await new Promise(r => setTimeout(r, path.includes('upload') ? 600 : 200));
        const clientPin = options.headers?.["X-PIN"];
        if (clientPin !== "1234") return { ok: false, status: 401 };
        if (path.startsWith("/api/files")) {
          if (options.method === "DELETE") {
            const fName = decodeURIComponent(path.split("/").pop());
            mockFiles = mockFiles.filter(f => f.name !== fName);
            return { ok: true };
          }
          return { ok: true, json: async () => ({ files: mockFiles }) };
        }
        if (path === "/api/upload" && options.method === "POST") {
          for (const file of (options.body?.getAll("files") ?? [])) {
            mockFiles.push({ name: file.name, size: file.size, url: URL.createObjectURL(file) });
          }
          return { ok: true };
        }
        if (path === "/api/clipboard") {
          if (options.method === "POST") return { ok: true };
          return { ok: true, json: async () => ({ ok: true, text: "Mock clipboard data" }) };
        }
        return { ok: false };
      }
      return fetch(path, options);
    }

    // ─── STATUS BAR ───────────────────────────────────────────────────────────
    function showStatus(text, type = 'loading') {
      const container = $("status-container");
      const statusText = $("status");
      const icon = container.querySelector('i');
      if (!text) { container.classList.add('hidden'); return; }

      container.classList.remove('hidden', 'bg-blue-50', 'text-blue-700', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700', 'bg-blue-500', 'text-white', 'animate-progress', 'flex');
      icon.className = '';

      if (type === 'loading') {
        container.classList.add('bg-blue-500', 'text-white', 'animate-progress', 'flex');
        icon.className = 'ph ph-spinner animate-spin text-lg';
      } else if (type === 'error') {
        container.classList.add('bg-red-50', 'text-red-700', 'flex');
        icon.className = 'ph ph-warning-circle text-lg';
      } else {
        container.classList.add('bg-green-50', 'text-green-700', 'flex');
        icon.className = 'ph ph-check-circle text-lg';
      }
      statusText.textContent = text;
      if (type !== 'loading') setTimeout(() => container.classList.add('hidden'), 3000);
    }

    // ─── HEADERS ──────────────────────────────────────────────────────────────
    function headers() {
      const pin = $("pin").value.trim();
      return pin ? { "X-PIN": pin } : {};
    }

    // ─── FORMAT ───────────────────────────────────────────────────────────────
    function fmt(bytes) {
      const u = ["B", "KB", "MB", "GB", "TB"]; let i = 0, n = bytes;
      while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
      return `${n.toFixed(n >= 10 || i === 0 ? 0 : 1)} ${u[i]}`;
    }

    function fileIcon(filename) {
      const ext = (filename.split(".").pop() || "").toLowerCase();
      const map = {
        pdf: "📕", doc: "📝", docx: "📝", rtf: "📝", txt: "📄",
        xls: "📊", xlsx: "📊", csv: "📑", ppt: "📽️", pptx: "📽️",
        js: "🟨", ts: "🟦", json: "🧩", html: "🌐", css: "🎨",
        md: "📘", yml: "⚙️", yaml: "⚙️", xml: "🧾",
        png: "🖼️", jpg: "🖼️", jpeg: "🖼️", webp: "🖼️", gif: "🖼️", svg: "🖼️",
        mp3: "🎵", wav: "🎵", m4a: "🎵",
        mp4: "🎬", mov: "🎬", mkv: "🎬", avi: "🎬",
        zip: "🗜️", rar: "🗜️", "7z": "🗜️", tar: "🗜️", gz: "🗜️",
        exe: "🧰", msi: "🧰", apk: "📱", ipa: "📱", iso: "💿"
      };
      return map[ext] || "📁";
    }

    // ─── SELECTION UI ─────────────────────────────────────────────────────────
    function updateSelectionUI() {
      const hasFiles = currentFiles.length > 0;
      const hasSelected = selectedFiles.size > 0;

      $("table-actions").classList.toggle("hidden", !hasFiles);
      $("table-actions").classList.toggle("flex", hasFiles);

      $("btn-download-selected").classList.toggle("hidden", !hasSelected);
      $("btn-download-selected").classList.toggle("flex", hasSelected);
      $("btn-delete-selected").classList.toggle("hidden", !hasSelected);
      $("btn-delete-selected").classList.toggle("flex", hasSelected);
      $("selected-text").classList.toggle("hidden", !hasSelected);
      $("selected-count").textContent = selectedFiles.size;
      $("btn-delete-all").classList.toggle("hidden", hasSelected);

      const cbAll = $("cb-select-all");
      if (cbAll) cbAll.checked = hasFiles && selectedFiles.size === currentFiles.length;

      document.querySelectorAll('.file-cb').forEach(cb => { cb.checked = selectedFiles.has(cb.value); });
    }

    function toggleSelect(encName) {
      selectedFiles.has(encName) ? selectedFiles.delete(encName) : selectedFiles.add(encName);
      updateSelectionUI();
    }

    function toggleSelectAll() {
      if (selectedFiles.size === currentFiles.length) {
        selectedFiles.clear();
      } else {
        currentFiles.forEach(f => selectedFiles.add(encodeURIComponent(f.name.normalize("NFC"))));
      }
      updateSelectionUI();
    }

    // ─── BUILD ROW (DocumentFragment batch) ──────────────────────────────────
    function buildRow(f, isNew = false) {
      const fileName = f.name.normalize("NFC");
      const ext = (fileName.split(".").pop() || "").toLowerCase() || "file";
      const encName = encodeURIComponent(fileName);
      const checked = selectedFiles.has(encName) ? 'checked' : '';

      const tr = document.createElement("tr");
      tr.dataset.enc = encName;
      tr.className = `hover:bg-slate-50/80 transition-colors group flex flex-col md:table-row p-4 md:p-0 gap-3 border-b border-slate-50${isNew ? ' file-row-new' : ''}`;
      tr.innerHTML = `
      <td class="px-4 py-4 text-center hidden md:table-cell text-slate-400 text-xs font-mono w-10 select-none">${f.index ?? ''}</td>
      <td class="md:px-6 md:py-4 text-center hidden md:table-cell w-12">
        <input type="checkbox" class="file-cb cursor-pointer w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" value="${encName}" ${checked} onchange="toggleSelect('${encName}')">
      </td>
      <td class="md:px-6 md:py-4">
        <div class="flex items-center gap-3 md:gap-4">
          <input type="checkbox" class="file-cb md:hidden cursor-pointer w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500" value="${encName}" ${checked} onchange="toggleSelect('${encName}')">
          <div class="w-12 h-12 rounded-xl bg-slate-100 border border-slate-200 flex items-center justify-center text-2xl shrink-0 group-hover:scale-105 transition-transform" title=".${ext}">
            ${fileIcon(fileName)}
          </div>
          <div class="min-w-0 flex-1">
            <button type="button" onclick="openPreviewModal('${encName}','${fileName.replace(/'/g, "\\'")}')" class="font-medium text-slate-800 truncate hover:text-blue-600 transition-colors text-left outline-none max-w-full overflow-hidden text-ellipsis" title="${fileName}">${fileName}</button>
            <div class="text-xs text-slate-400 uppercase tracking-wider mt-0.5">${ext}</div>
          </div>
        </div>
      </td>
      <td class="md:px-6 md:py-4 text-slate-500 md:text-right font-medium text-sm">
        <span class="md:hidden inline-block w-20 text-slate-400 font-normal">Kích thước:</span>
        ${fmt(f.size)}
      </td>
      <td class="md:px-6 md:py-4">
        <div class="flex items-center md:justify-center gap-1">
          <button onclick="openPreviewModal('${encName}','${fileName.replace(/'/g, "\\'")}')" class="flex items-center justify-center w-10 h-10 rounded-lg text-slate-600 hover:bg-slate-200 transition-colors" title="Xem trước">
            <i class="ph ph-eye text-xl"></i>
          </button>
          <a href="/download/${encName}" target="_blank" class="flex items-center justify-center w-10 h-10 rounded-lg text-blue-600 hover:bg-blue-100 transition-colors" title="Tải xuống">
            <i class="ph ph-download-simple text-xl"></i>
          </a>
          <button onclick="openDeleteModal('${encName}','${fileName.replace(/'/g, "\\'")}')" class="flex items-center justify-center w-10 h-10 rounded-lg text-red-500 hover:bg-red-50 hover:text-red-600 transition-colors" title="Xoá file">
            <i class="ph ph-trash text-xl"></i>
          </button>
        </div>
      </td>`;
      return tr;
    }

    // ─── DOM DIFF RENDER ──────────────────────────────────────────────────────
    // Chỉ thêm/xóa row thực sự thay đổi, không xóa trắng toàn bộ bảng
    function renderFiles(files) {
      const tb = $("list");

      if (files.length === 0) {
        tb.innerHTML = `
        <tr><td colspan="4" class="px-6 py-10 text-center text-slate-400">
          <i class="ph ph-folder-dashed text-4xl mb-2 animate-bounce mt-4 block"></i>
          <p>Chưa có tệp tin nào</p>
        </td></tr>`;
        return;
      }

      // Key set của dữ liệu mới
      const newKeys = new Set(files.map(f => encodeURIComponent(f.name.normalize("NFC"))));

      // Xóa các placeholder row (locked / empty) — không có data-enc
      tb.querySelectorAll("tr:not([data-enc])").forEach(tr => tr.remove());

      // Xóa row file không còn tồn tại trên server
      tb.querySelectorAll("tr[data-enc]").forEach(tr => {
        if (!newKeys.has(tr.dataset.enc)) tr.remove();
      });

      // Lấy map row hiện tại
      const existingMap = new Map();
      tb.querySelectorAll("tr[data-enc]").forEach(tr => existingMap.set(tr.dataset.enc, tr));

      // Thêm row mới bằng DocumentFragment (batch insert, tránh reflow nhiều lần)
      const frag = document.createDocumentFragment();
      for (const f of files) {
        const encName = encodeURIComponent(f.name.normalize("NFC"));
        if (!existingMap.has(encName)) {
          frag.appendChild(buildRow(f, true));
        }
      }
      if (frag.childNodes.length > 0) tb.appendChild(frag);
    }

    // ─── REFRESH ─────────────────────────────────────────────────────────────
    function debouncedRefresh() {
      clearTimeout(_refreshTimer);
      _refreshTimer = setTimeout(() => refresh(), 300);
    }

    async function refresh(force = false) {
      try {
        const reqHeaders = { ...headers() };
        // Gửi ETag để server trả 304 nếu không có gì thay đổi
        if (lastEtag && !force) reqHeaders["If-None-Match"] = lastEtag;

        const res = await safeFetch("/api/files", { headers: reqHeaders });

        if (res.status === 304) return; // Dữ liệu không đổi, không cần re-render

        if (!res.ok) {
          $("list").innerHTML = `
          <tr><td colspan="4" class="px-6 py-10 text-center text-red-500">
            <i class="ph ph-lock-key text-4xl mb-2 block"></i>
            <p>Vui lòng nhập đúng mã PIN để xem tệp tin.</p>
          </td></tr>`;
          $("file-count").textContent = "Bị khóa";
          currentFiles = [];
          updateSelectionUI();
          return;
        }

        // Lưu ETag mới để dùng lần sau
        const etag = res.headers?.get?.("ETag");
        if (etag) lastEtag = etag;

        const data = await res.json();
        currentFiles = data.files || [];

        // Lọc selection đã lỗi thời
        const encSet = new Set(currentFiles.map(f => encodeURIComponent(f.name.normalize("NFC"))));
        for (const enc of selectedFiles) { if (!encSet.has(enc)) selectedFiles.delete(enc); }

        $("file-count").textContent = `${currentFiles.length} file`;
        updateSelectionUI();
        renderFiles(currentFiles);

        // Fetch clipboard cùng lúc luôn
        fetchClipboard();

      } catch (e) {
        console.error("Refresh error:", e);
        if (currentFiles.length === 0) {
          $("list").innerHTML = `<tr><td colspan="4" class="px-6 py-10 text-center text-slate-400">Đang chờ kết nối...</td></tr>`;
        }
      }
    }

    // ─── CLIPBOARD LOGIC ─────────────────────────────────────────────────────
    let clipboardHistory = [];

    // Render danh sách Clipboard
    function renderClipboardList() {
      const container = $("clipboard-list");

      if (!clipboardHistory || clipboardHistory.length === 0) {
        container.innerHTML = `<div class="text-center py-6 text-slate-400 text-sm italic">Chưa có nội dung nào được chia sẻ</div>`;
        return;
      }

      container.innerHTML = clipboardHistory.map((item, index) => {
        // Tính toán thời gian tương đối
        const diff = Math.floor((Date.now() - item.timestamp) / 1000);
        let timeStr = "Vừa xong";
        if (diff > 86400) timeStr = `${Math.floor(diff / 86400)} ngày trước`;
        else if (diff > 3600) timeStr = `${Math.floor(diff / 3600)} giờ trước`;
        else if (diff > 60) timeStr = `${Math.floor(diff / 60)} phút trước`;

        const escText = item.text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        // Giữ nguyên dòng (newline) bằng cách dùng pre-wrap

        return `
          <div id="cb-item-${item.id}" class="group bg-white rounded-xl border border-slate-200 p-3 shadow-sm hover:shadow-md transition-all ${index === 0 ? 'clipboard-item-enter' : ''}">
            <div class="flex items-start justify-between gap-3 mb-2">
              <span class="text-[11px] font-medium text-slate-400 bg-slate-50 px-2 py-0.5 rounded-full">${timeStr}</span>
              <button onclick="deleteClipboard('${item.id}')" class="text-slate-300 hover:text-red-500 hover:bg-red-50 p-1 rounded transition-colors opacity-0 group-hover:opacity-100" title="Xóa">
                <i class="ph ph-trash text-sm"></i>
              </button>
            </div>
            <div class="text-sm text-slate-700 font-mono whitespace-pre-wrap break-words max-h-[150px] overflow-y-auto pr-1 mb-3 scrollbar-thin">${escText}</div>
            <div class="flex justify-end border-t border-slate-100 pt-2 mt-2">
              <button onclick="copyClipboardItem('${item.id}', this)" class="text-xs font-medium text-blue-600 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors">
                <i class="ph ph-copy"></i>
                <span>Copy</span>
              </button>
            </div>
          </div>
        `;
      }).join("");
    }

    async function fetchClipboard() {
      try {
        const res = await safeFetch("/api/clipboard", { headers: headers() });
        if (!res.ok) return;
        const data = await res.json();
        if (data.ok && Array.isArray(data.history)) {
          clipboardHistory = data.history;
          renderClipboardList();
        }
      } catch (e) {
        console.error("Fetch clipboard error", e);
      }
    }

    async function saveClipboard() {
      const btn = $("btn-save-clipboard");
      const textarea = $("shared-clipboard");
      const text = textarea.value.trim();

      if (!text) return; // Không lưu chuỗi rỗng

      btn.classList.add("opacity-50", "pointer-events-none");
      btn.innerHTML = `<i class="ph ph-spinner animate-spin text-sm"></i> <span>Gửi</span>`;

      try {
        const res = await safeFetch("/api/clipboard", {
          method: "POST",
          headers: { ...headers(), "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });
        if (res.ok) {
          // Xóa trắng input ngay lập tức
          textarea.value = "";
          handleClipboardInput(); // Reset kích thước textarea

          const data = await res.json();
          if (data.item) {
            // Cập nhật mảng local và render tạm thời để trông mượt mà
            clipboardHistory.unshift(data.item);
            if (clipboardHistory.length > 50) clipboardHistory.pop();
            renderClipboardList();
          }
        } else {
          showStatus("Lỗi lưu Clipboard (Sai PIN?)", "error");
        }
      } catch (e) {
        showStatus("Mất kết nối server", "error");
      } finally {
        btn.classList.remove("opacity-50", "pointer-events-none");
        btn.innerHTML = `<i class="ph ph-paper-plane-right text-sm"></i> <span>Gửi</span>`;
      }
    }

    async function deleteClipboard(id) {
      if (!confirm("Bạn có chắc chắn muốn xóa tin này khỏi lịch sử hiện tại không? Mọi người đều sẽ bị xóa lịch sử của đoạn này.")) return;

      try {
        // Tạm thời xóa trên UI cho cảm giác mượt
        const el = $(`cb-item-${id}`);
        if (el) {
          el.classList.add("clipboard-item-leave");
          setTimeout(() => {
            clipboardHistory = clipboardHistory.filter(item => item.id !== id);
            renderClipboardList();
          }, 200);
        }

        await safeFetch(`/api/clipboard/${id}`, {
          method: "DELETE",
          headers: headers()
        });
      } catch (e) {
        console.error("Delete clipboard error", e);
      }
    }

    async function copyClipboardItem(id, btn) {
      const item = clipboardHistory.find(x => x.id === id);
      if (!item) return;

      const icon = btn.querySelector("i");
      const span = btn.querySelector("span");

      try {
        await navigator.clipboard.writeText(item.text);

        // UI feedback cho nút Card cụ thể
        const oldClass = icon.className;
        icon.className = "ph ph-check text-green-600 font-bold";
        span.textContent = "Đã chép";
        btn.classList.add("bg-green-100", "text-green-700");
        btn.classList.remove("bg-blue-50", "text-blue-600");

        setTimeout(() => {
          icon.className = oldClass;
          span.textContent = "Copy";
          btn.classList.remove("bg-green-100", "text-green-700");
          btn.classList.add("bg-blue-50", "text-blue-600");
        }, 1500);
      } catch (e) {
        // Fallback for older browsers
        const t = document.createElement("textarea");
        t.value = item.text;
        t.style.position = "fixed";
        t.style.opacity = "0";
        document.body.appendChild(t);
        t.select();
        document.execCommand("copy");
        document.body.removeChild(t);

        span.textContent = "Đã chép";
        setTimeout(() => span.textContent = "Copy", 1500);
      }
    }

    function handleClipboardKeydown(e) {
      // Nhấn Enter không Shift, hoặc Ctrl+Enter / Cmd+Enter để Gửi
      if (e.key === 'Enter') {
        if (e.ctrlKey || e.metaKey || !e.shiftKey) {
          e.preventDefault();
          saveClipboard();
        }
      }
    }

    function handleClipboardInput() {
      // Auto resize height cho text area nhập
      const el = $("shared-clipboard");
      el.style.height = "auto";
      el.style.height = (el.scrollHeight) + "px";
    }

    // ─── UPLOAD ──────────────────────────────────────────────────────────────
    async function upload() {
      const files = $("picker").files;
      if (!files?.length) return;

      const fd = new FormData();
      for (const f of files) {
        fd.append("files", new File([f], f.name.normalize("NFC"), { type: f.type, lastModified: f.lastModified }));
      }

      const drop = $("drop");
      drop.classList.add("opacity-50", "pointer-events-none");
      showStatus(`Đang tải lên ${files.length} file...`, "loading");

      try {
        // Gửi PIN cả trong header lẫn query param để đảm bảo hoạt động sau proxy/Nginx
        const pinVal = $("pin").value.trim();
        const uploadUrl = pinVal ? `/api/upload?pin=${encodeURIComponent(pinVal)}` : "/api/upload";
        const res = await safeFetch(uploadUrl, { method: "POST", body: fd, headers: headers() });
        if (!res.ok) {
          showStatus("Lỗi tải lên. Vui lòng kiểm tra mã PIN", "error");
        } else {
          showStatus("Tải lên thành công!", "success");
          $("picker").value = "";
          lastEtag = null; // Force re-fetch sau upload
          refresh();
        }
      } catch (e) {
        console.error("Upload error:", e);
        showStatus("Mất kết nối với máy chủ", "error");
      } finally {
        drop.classList.remove("opacity-50", "pointer-events-none");
      }
    }

    // ─── PREVIEW MODAL ────────────────────────────────────────────────────────
    async function openPreviewModal(encName, fileName) {
      const ext = fileName.split('.').pop().toLowerCase();
      const previewBody = $("preview-body");

      $("preview-title").textContent = fileName;
      $("preview-title").title = fileName;
      $("preview-modal").classList.remove("hidden");

      const downloadBtn = $("preview-download-btn");
      downloadBtn.href = `/download/${encName}`;
      downloadBtn.onclick = null;

      previewBody.innerHTML = '<div class="flex flex-col items-center justify-center h-full text-blue-500"><i class="ph ph-spinner animate-spin text-5xl mb-2"></i><p class="font-medium">Đang xử lý nội dung...</p></div>';

      let actualUrl = `/download/${encName}`;
      const pin = $("pin").value.trim();
      const actualUrlWithPin = pin ? `${actualUrl}?pin=${encodeURIComponent(pin)}` : actualUrl;

      if (isLocalPreview) {
        const mockF = mockFiles.find(f => encodeURIComponent(f.name.normalize("NFC")) === encName);
        if (mockF?.url) {
          actualUrl = mockF.url;
        } else {
          previewBody.innerHTML = `<div class="text-center text-slate-500">
          <i class="ph ph-eye-slash text-5xl mb-3 text-slate-300 block"></i>
          <p class="font-medium text-slate-700">Không thể xem trước tệp ảo</p>
          <p class="text-sm mt-1">Chỉ hỗ trợ xem trước tệp vừa kéo thả lên.</p>
        </div>`;
          return;
        }
      }

      const fetchHeaders = headers();

      const imgExts = ['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'ico'];
      const videoExts = ['mp4', 'webm', 'ogg'];
      const audioExts = ['mp3', 'wav', 'm4a'];
      const textExts = ['txt', 'md', 'js', 'ts', 'html', 'css', 'json', 'csv', 'xml', 'log', 'yaml', 'yml'];

      if (ext === 'pdf') {
        // Dùng iframe native của trình duyệt thay vì pdf.js CDN
        // Trình duyệt hiện đại đều có sẵn PDF viewer tích hợp
        previewBody.innerHTML = `<iframe
          src="${actualUrl}"
          class="w-full h-full rounded-lg border-0 bg-white"
          title="${fileName}"
        ></iframe>`;

      } else if (ext === 'docx') {
        try {
          await lazyLoad('https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js');
          const r = await fetch(actualUrl, { headers: fetchHeaders });
          const ab = await r.arrayBuffer();
          const result = await mammoth.convertToHtml({ arrayBuffer: ab });
          previewBody.innerHTML = `<div class="bg-white p-8 rounded-xl shadow-sm text-left w-full max-w-4xl preview-doc-content text-black">${result.value}</div>`;
        } catch {
          previewBody.innerHTML = `<div class="text-center text-red-500"><i class="ph ph-warning-circle text-4xl mb-2 block"></i><p>Không thể đọc định dạng Word này.</p></div>`;
        }

      } else if (['xlsx', 'xls', 'csv'].includes(ext)) {
        try {
          await lazyLoad('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
          const r = await fetch(actualUrl, { headers: fetchHeaders });
          const ab = await r.arrayBuffer();
          const wb = XLSX.read(ab, { type: 'array' });
          const wsname = wb.SheetNames[0];
          const html = XLSX.utils.sheet_to_html(wb.Sheets[wsname]);
          previewBody.innerHTML = `<div class="bg-white p-6 rounded-xl shadow-sm w-full overflow-auto max-w-full preview-excel-content text-black">
          <div class="flex items-center gap-2 mb-4 bg-slate-50 border border-slate-200 p-2.5 rounded-lg w-max">
            <i class="ph ph-table text-green-600 text-lg"></i>
            <span class="text-sm font-semibold text-slate-700">Trang tính: ${wsname}</span>
          </div>
          ${html}</div>`;
        } catch {
          previewBody.innerHTML = `<div class="text-center text-red-500"><i class="ph ph-warning-circle text-4xl mb-2 block"></i><p>Không thể đọc định dạng Excel này.</p></div>`;
        }

      } else if (['doc', 'ppt', 'pptx'].includes(ext)) {
        previewBody.innerHTML = `<div class="text-center text-slate-500 max-w-sm">
        <i class="ph ph-file-x text-6xl mb-4 text-slate-300 block"></i>
        <p class="text-lg font-bold text-slate-700 mb-2">Định dạng phức tạp</p>
        <p class="text-sm leading-relaxed">Trình duyệt không hỗ trợ xem <b>.${ext}</b>. Vui lòng tải về máy.</p>
      </div>`;

      } else if (imgExts.includes(ext)) {
        previewBody.innerHTML = `<img src="${actualUrlWithPin}" loading="lazy" class="max-w-full max-h-[75vh] object-contain rounded-lg shadow-sm bg-white p-2" alt="Preview" />`;

      } else if (videoExts.includes(ext)) {
        previewBody.innerHTML = `<video src="${actualUrlWithPin}" controls autoplay class="max-w-full max-h-[75vh] w-full rounded-lg shadow-lg bg-black"></video>`;

      } else if (audioExts.includes(ext)) {
        previewBody.innerHTML = `<div class="flex flex-col items-center justify-center p-8 bg-white rounded-2xl shadow-sm w-full max-w-md">
        <i class="ph ph-music-notes text-6xl text-blue-500 mb-6 bg-blue-50 p-4 rounded-full block"></i>
        <audio src="${actualUrlWithPin}" controls autoplay class="w-full outline-none"></audio>
      </div>`;

      } else if (textExts.includes(ext)) {
        try {
          const r = await fetch(actualUrl, { headers: fetchHeaders });
          const text = await r.text();
          const safe = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          previewBody.innerHTML = `<pre class="bg-slate-900 text-slate-50 p-6 rounded-xl text-sm overflow-auto h-full text-left w-full max-w-5xl whitespace-pre-wrap font-mono shadow-inner border border-slate-800"><code>${safe}</code></pre>`;
        } catch {
          previewBody.innerHTML = `<p class="text-center text-red-500 p-10">Lỗi khi tải nội dung văn bản.</p>`;
        }

      } else {
        previewBody.innerHTML = `<div class="text-center text-slate-500 max-w-sm">
        <i class="ph ph-prohibit text-6xl mb-4 text-slate-300 block"></i>
        <p class="text-lg font-bold text-slate-700 mb-2">Chưa hỗ trợ định dạng này</p>
        <p class="text-sm leading-relaxed">Định dạng <b>.${ext}</b> chưa được hỗ trợ. Hãy tải về.</p>
      </div>`;
      }
    }

    function closePreviewModal() {
      $("preview-modal").classList.add("hidden");
      $("preview-body").innerHTML = "";
    }

    // ─── DOWNLOAD SELECTED ────────────────────────────────────────────────────
    async function downloadSelected() {
      const list = Array.from(selectedFiles);
      if (!list.length) return;
      showStatus(`Đang bắt đầu tải xuống ${list.length} tệp...`, "loading");
      for (const encName of list) {
        const a = document.createElement('a');
        a.href = `/download/${encName}`;
        a.target = '_blank';
        a.download = decodeURIComponent(encName);
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        await new Promise(r => setTimeout(r, 300));
      }
      showStatus(`Đã gửi yêu cầu tải ${list.length} tệp!`, "success");
    }

    // ─── DELETE MODALS ────────────────────────────────────────────────────────
    function openDeleteModal(encName, fileName) {
      currentFilesToDelete = [{ encName, name: fileName }];
      $("delete-message").textContent = "Bạn có chắc chắn muốn xoá tệp tin này không?";
      $("delete-filename").textContent = fileName;
      $("delete-filename").classList.remove("text-red-600");
      $("delete-modal").classList.remove("hidden");
    }
    function openDeleteSelectedModal() {
      currentFilesToDelete = Array.from(selectedFiles).map(encName => {
        const f = currentFiles.find(f => encodeURIComponent(f.name.normalize("NFC")) === encName);
        return { encName, name: f ? f.name.normalize("NFC") : decodeURIComponent(encName) };
      });
      $("delete-message").textContent = "Bạn có chắc chắn muốn xoá các tệp tin đã chọn?";
      $("delete-filename").textContent = `${currentFilesToDelete.length} tệp tin`;
      $("delete-filename").classList.remove("text-red-600");
      $("delete-modal").classList.remove("hidden");
    }
    function openDeleteAllModal() {
      currentFilesToDelete = currentFiles.map(f => ({ encName: encodeURIComponent(f.name.normalize("NFC")), name: f.name.normalize("NFC") }));
      $("delete-message").textContent = "Bạn có chắc chắn muốn xoá TẤT CẢ tệp tin không? Hành động này không thể hoàn tác.";
      $("delete-filename").textContent = `${currentFilesToDelete.length} tệp tin (Toàn bộ)`;
      $("delete-filename").classList.add("text-red-600");
      $("delete-modal").classList.remove("hidden");
    }
    function closeDeleteModal() {
      currentFilesToDelete = [];
      $("delete-modal").classList.add("hidden");
    }

    async function executeDelete() {
      if (!currentFilesToDelete.length) return;
      const filesToDelete = [...currentFilesToDelete];
      closeDeleteModal();

      showStatus(filesToDelete.length === 1 ? "Đang xoá tệp tin..." : `Đang xoá ${filesToDelete.length} tệp tin...`, "loading");

      let successCount = 0, failCount = 0;
      try {
        await Promise.all(filesToDelete.map(async (file) => {
          const res = await safeFetch(`/api/files/${file.encName}`, { method: "DELETE", headers: headers() });
          if (res.ok) { successCount++; selectedFiles.delete(file.encName); }
          else failCount++;
        }));

        showStatus(
          failCount > 0
            ? `Xoá thành công ${successCount}. ${failCount} lỗi (Sai mã PIN?)`
            : `Đã xoá ${successCount} tệp tin thành công`,
          failCount > 0 ? "error" : "success"
        );

        lastEtag = null; // Buộc re-fetch
        refresh();
      } catch (e) {
        console.error("Delete error:", e);
        showStatus("Mất kết nối với máy chủ", "error");
      }
    }

    // ─── DRAG & DROP (passive listeners) ─────────────────────────────────────
    const dropEl = $("drop");
    dropEl.addEventListener("dragover", e => {
      e.preventDefault();
      if (dropEl.classList.contains("pointer-events-none")) return;
      dropEl.classList.add("border-blue-400", "bg-blue-50");
      dropEl.classList.remove("border-slate-300", "bg-slate-50");
    }, { passive: false });
    dropEl.addEventListener("dragleave", () => {
      if (dropEl.classList.contains("pointer-events-none")) return;
      dropEl.classList.remove("border-blue-400", "bg-blue-50");
      dropEl.classList.add("border-slate-300", "bg-slate-50");
    }, { passive: true });
    dropEl.addEventListener("drop", e => {
      e.preventDefault();
      if (dropEl.classList.contains("pointer-events-none")) return;
      dropEl.classList.remove("border-blue-400", "bg-blue-50");
      dropEl.classList.add("border-slate-300", "bg-slate-50");
      $("picker").files = e.dataTransfer.files;
      upload();
    }, { passive: false });

    // ─── REALTIME (SSE + fallback polling) ───────────────────────────────────
    let es = null;
    let pollTimer = null;

    function startRealtime() {
      if (isLocalPreview) { startPolling(); return; }

      try {
        const pin = $("pin").value.trim();
        const url = pin ? `/events?pin=${encodeURIComponent(pin)}` : `/events`;
        es = new EventSource(url);

        es.addEventListener("changed", () => debouncedRefresh());
        es.addEventListener("hello", () => { });
        es.addEventListener("clipboard", (e) => {
          try {
            const data = JSON.parse(e.data);
            if (data && Array.isArray(data.history)) {
              clipboardHistory = data.history;
              renderClipboardList();
            }
          } catch (err) { console.error("SSE clipboard error", err); }
        });

        es.onerror = () => {
          try { es.close(); } catch { }
          es = null;
          startPolling();
        };
      } catch {
        startPolling();
      }
    }

    function startPolling() {
      if (pollTimer) return;
      pollTimer = setInterval(() => debouncedRefresh(), 5000); // 5s thay vì 3s để nhẹ hơn
    }

    // ─── VISIBILITY CHANGE — dừng polling khi tab ẩn ─────────────────────────
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        // Tab ẩn: tạm dừng polling, đóng SSE để tiết kiệm tài nguyên
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        if (es) { try { es.close(); } catch { } es = null; }
      } else {
        // Tab hiện trở lại: refresh ngay và khởi động lại realtime
        lastEtag = null;
        refresh();
        startRealtime();
      }
    }, { passive: true });

    // ─── INIT ─────────────────────────────────────────────────────────────────
    refresh();
    startRealtime();
  </script>
</body>
