<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f8fafc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>LAN Share</title>

  <!-- Preconnect & Fonts -->
  <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/fill/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/bold/style.css">

  <!-- Office Preview Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <style>
    :root {
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
      --safe-area-top: env(safe-area-inset-top, 0px);
    }

    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
      /* Ngăn pull-to-refresh mặc định gây khó chịu */
      background-color: #f8fafc;
    }

    /* Hide scrollbar for a cleaner mobile look but keep functionality */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Custom Scrollbar for desktop */
    @media (min-width: 768px) {
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    }

    /* Modals & Animations */
    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .modal-slide-up {
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .modal-fade-in {
      animation: fadeIn 0.2s ease-out forwards;
    }

    /* Toast Animation */
    @keyframes slideDownToast {
      from {
        transform: translate(-50%, -100%);
        opacity: 0;
      }

      to {
        transform: translate(-50%, 0);
        opacity: 1;
      }
    }

    .toast-enter {
      animation: slideDownToast 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Text truncate for multi-line */
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* File Group Section Headers */
    .group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.15s;
      border-bottom: 1px solid #f1f5f9;
    }

    .group-header:hover {
      background-color: #f8fafc;
    }

    .group-header:active {
      background-color: #f1f5f9;
    }

    @media (min-width: 768px) {
      .group-header {
        padding: 12px 24px;
      }
    }

    .group-chevron {
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      color: #94a3b8;
      font-size: 16px;
      flex-shrink: 0;
    }

    .group-collapsed .group-chevron {
      transform: rotate(-90deg);
    }

    .group-body {
      max-height: 5000px;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
      opacity: 1;
    }

    .group-collapsed .group-body {
      max-height: 0 !important;
      opacity: 0;
    }

    /* Preview styles */
    .preview-doc-content {
      font-family: serif;
      line-height: 1.6;
    }

    .preview-doc-content table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 1em;
    }

    .preview-doc-content th,
    .preview-doc-content td {
      border: 1px solid #cbd5e1;
      padding: 6px;
    }

    /* Excel Preview Table (SheetJS) */
    .xl-preview table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
      font-size: 13px;
    }

    .xl-preview th,
    .xl-preview td {
      border: 1px solid #e2e8f0;
      padding: 6px 10px;
      text-align: left;
      white-space: nowrap;
    }

    .xl-preview tr:first-child td,
    .xl-preview tr:first-child th {
      background: #f1f5f9;
      font-weight: 600;
      color: #334155;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .xl-preview tr:nth-child(even) {
      background: #f8fafc;
    }

    .xl-preview tr:hover {
      background: #eff6ff;
    }

    /* Mobile App-like structure */
    .app-container {
      height: 100dvh;
      /* Dynamic viewport height cho iOS/Android */
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-content {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      /* Overflow controlled per-tab on mobile */
    }

    /* Mobile: each tab takes full area */
    @media (max-width: 767px) {
      .main-content {
        position: relative;
      }

      #tab-files {
        position: absolute;
        inset: 0;
        overflow-y: auto;
        padding-bottom: calc(80px + var(--safe-area-bottom));
        display: flex;
        flex-direction: column;
      }

      #tab-files.tab-hidden {
        display: none !important;
      }

      #tab-clipboard {
        position: absolute;
        inset: 0;
        overflow: hidden;
        display: none;
        flex-direction: column;
      }

      #tab-clipboard.tab-active {
        display: flex !important;
      }
    }

    @media (min-width: 768px) {
      .main-content {
        overflow-y: auto;
        padding-bottom: 2rem;
      }
    }
  </style>
</head>

<body class="text-slate-800 antialiased selection:bg-blue-100 selection:text-blue-900">

  <!-- TOAST NOTIFICATION (Nổi ở trên) -->
  <div id="toast-container"
    class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] hidden flex-col items-center gap-2 w-full max-w-[90%] md:max-w-sm pt-[var(--safe-area-top)]">
    <div id="toast"
      class="flex items-center gap-3 px-4 py-3 rounded-2xl shadow-lg font-medium text-sm w-full bg-white border border-slate-100 transition-all">
      <i id="toast-icon" class="ph ph-spinner animate-spin text-xl text-blue-500"></i>
      <span id="toast-msg" class="flex-1 truncate text-slate-700">Đang xử lý...</span>
    </div>
  </div>

  <div class="app-container max-w-5xl mx-auto md:p-6 md:gap-6">

    <!-- HEADER -->
    <header
      class="bg-white/90 backdrop-blur-xl md:rounded-3xl shadow-sm border-b md:border border-slate-200/60 p-4 md:px-6 md:py-4 flex items-center justify-between gap-4 z-40 sticky top-0 pt-[calc(1rem+var(--safe-area-top))] md:pt-4">
      <div class="flex items-center gap-2">
        <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center text-white shadow-inner">
          <i class="ph-fill ph-hard-drives text-2xl"></i>
        </div>
        <h1 class="text-xl font-bold text-slate-900 hidden sm:block">LAN Share</h1>
      </div>

      <!-- Auth Zone -->
      <div class="flex flex-1 md:flex-none justify-end items-center gap-2 max-w-xs ml-auto">
        <div class="relative w-full transition-all" id="pin-container">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="ph ph-lock-key text-slate-400"></i>
          </div>
          <input id="pin" type="password" placeholder="Mã PIN" inputmode="numeric"
            class="w-full pl-9 pr-3 py-2.5 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500/50 transition-all text-sm font-medium"
            onkeyup="if(event.key==='Enter') { lastEtag=null; refresh(true); }"
            oninput="clearTimeout(_pinTimer); _pinTimer=setTimeout(()=>{ lastEtag=null; refresh(true); }, 500)" />
        </div>

        <button id="btn-logout-pin" onclick="logoutPin()"
          class="hidden items-center justify-center gap-2 px-4 py-2.5 bg-green-50 text-green-700 rounded-xl text-sm font-semibold active:scale-95 transition-transform whitespace-nowrap"
          title="Đổi mã PIN">
          <i class="ph-fill ph-check-circle text-lg"></i>
          <span class="hidden sm:inline">Đã mở khóa</span>
        </button>

        <button onclick="refresh(true)"
          class="w-10 h-10 flex items-center justify-center bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-xl active:scale-95 transition-all shrink-0">
          <i class="ph ph-arrows-clockwise text-xl"></i>
        </button>
      </div>
    </header>

    <!-- MAIN CONTENT AREA -->
    <main class="main-content md:flex md:gap-6 md:overflow-y-auto md:pb-0">

      <!-- TAB 1: FILES (Mặc định) -->
      <section id="tab-files" class="w-full flex flex-col md:w-2/3 md:h-auto">

        <!-- Desktop Kéo Thả (Ẩn trên mobile) -->
        <div class="hidden md:block bg-white rounded-3xl shadow-sm border border-slate-100 p-6 mb-6">
          <label id="drop" for="picker-desktop"
            class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-200 border-dashed rounded-2xl bg-slate-50 hover:bg-blue-50 hover:border-blue-400 transition-colors cursor-pointer group">
            <div class="p-3 bg-white rounded-full shadow-sm mb-2 group-hover:scale-110 transition-transform">
              <i class="ph ph-cloud-arrow-up text-2xl text-blue-500"></i>
            </div>
            <p class="text-sm text-slate-600 font-medium"><span class="text-blue-600">Chọn file</span> hoặc kéo thả vào
              đây</p>
          </label>
          <input id="picker-desktop" type="file" multiple class="hidden" onchange="upload(this)" />
        </div>

        <!-- File List Container -->
        <div class="bg-white md:rounded-3xl shadow-sm md:border border-slate-100 flex-1 flex flex-col min-h-[50vh]">

          <!-- Toolbars -->
          <div
            class="px-4 py-3 border-b border-slate-100 bg-white/80 backdrop-blur z-20 sticky top-0 md:static flex items-center justify-between">
            <div class="flex items-center gap-2">
              <h2 class="font-bold text-slate-800 text-lg">Tệp tin</h2>
              <span id="file-count"
                class="text-[10px] font-bold bg-slate-100 text-slate-600 px-2 py-1 rounded-md">0</span>
            </div>

            <div class="flex items-center gap-1.5">
              <!-- Nút tạo thư mục -->
              <button onclick="promptCreateFolder()"
                class="w-9 h-9 flex items-center justify-center bg-amber-50 text-amber-600 rounded-lg active:scale-95 transition-transform"
                title="Tạo thư mục mới">
                <i class="ph ph-folder-plus text-lg"></i>
              </button>
              <!-- Nút chia sẻ link -->
              <button onclick="shareCurrentLink()"
                class="w-9 h-9 flex items-center justify-center bg-indigo-50 text-indigo-600 rounded-lg active:scale-95 transition-transform"
                title="Chia sẻ đường dẫn">
                <i class="ph ph-share-network text-lg"></i>
              </button>

              <!-- Contextual Actions (khi có select) -->
              <div id="table-actions" class="hidden items-center gap-1.5">
                <span class="text-xs font-semibold text-slate-500 hidden sm:block mr-1"><span
                    id="selected-count">0</span>
                  chọn</span>
                <button onclick="toggleSelectAll()"
                  class="text-xs font-medium bg-slate-100 text-slate-700 px-3 py-2 rounded-lg active:scale-95 transition-transform md:hidden">
                  Chọn tất cả
                </button>
                <button id="btn-download-selected" onclick="downloadSelected()"
                  class="w-9 h-9 flex items-center justify-center bg-blue-50 text-blue-600 rounded-lg active:scale-95 transition-transform"
                  title="Tải về">
                  <i class="ph ph-download-simple text-lg"></i>
                </button>
                <button id="btn-delete-selected" onclick="openDeleteSelectedModal()"
                  class="w-9 h-9 flex items-center justify-center bg-red-50 text-red-600 rounded-lg active:scale-95 transition-transform"
                  title="Xóa">
                  <i class="ph ph-trash text-lg"></i>
                </button>
              </div>
            </div>
          </div>

          <!-- Breadcrumb -->
          <div id="breadcrumb-bar"
            class="px-4 py-2 border-b border-slate-50 bg-slate-50/50 flex items-center gap-1.5 text-sm overflow-x-auto hide-scrollbar">
            <!-- Render bởi JS -->
          </div>

          <!-- Danh sách -->
          <div class="flex-1 overflow-x-hidden hide-scrollbar">
            <!-- Table Header (Desktop only) -->
            <div
              class="hidden md:flex px-6 py-2 bg-slate-50 text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-slate-100">
              <div class="w-10 text-center"><input type="checkbox" id="cb-select-all"
                  class="rounded border-slate-300 text-blue-600" onchange="toggleSelectAll()"></div>
              <div class="flex-1 px-4">Tên</div>
              <div class="w-24 text-right">Kích cỡ</div>
              <div class="w-32 text-center">Thao tác</div>
            </div>

            <div id="list" class="flex flex-col divide-y divide-slate-100 pb-20 md:pb-0">
              <!-- Render JS -->
            </div>
          </div>
        </div>
      </section>

      <!-- TAB 2: CLIPBOARD (Chat Style) -->
      <section id="tab-clipboard"
        class="w-full flex-col md:w-1/3 bg-white md:rounded-3xl shadow-sm md:border border-slate-100 overflow-hidden relative md:flex">
        <div class="px-4 py-3 border-b border-slate-100 bg-white/80 backdrop-blur z-10 sticky top-0">
          <h2 class="font-bold text-slate-800 text-lg flex items-center gap-2">
            <i class="ph-fill ph-chat-centered-text text-blue-500"></i> Bảng tạm
          </h2>
        </div>

        <!-- Lịch sử Chat -->
        <div id="clipboard-list"
          class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 bg-slate-50/50 hide-scrollbar pb-[80px] md:pb-24">
          <div class="text-center py-10 text-slate-400 text-sm">Đang tải...</div>
        </div>

        <!-- Ô nhập liệu (Sticky bottom) -->
        <!-- Mobile: bottom = 80px (bottom nav) + safe-area. Desktop: bottom = 0 -->
        <div
          class="absolute bottom-[calc(80px+var(--safe-area-bottom))] md:bottom-0 left-0 w-full bg-white border-t border-slate-100 p-3 z-20">
          <div
            class="bg-slate-100 rounded-2xl flex items-end p-1.5 focus-within:ring-2 focus-within:ring-blue-500/30 transition-shadow">
            <textarea id="shared-clipboard" rows="1"
              class="flex-1 max-h-[120px] bg-transparent border-none focus:ring-0 text-sm py-2.5 px-3 resize-none hide-scrollbar placeholder:text-slate-400"
              placeholder="Nhập text để dán..." onkeydown="handleClipboardKeydown(event)"
              oninput="handleClipboardInput()"></textarea>
            <button id="btn-save-clipboard" onclick="saveClipboard()"
              class="w-10 h-10 shrink-0 bg-blue-500 text-white rounded-xl flex items-center justify-center shadow-md active:scale-90 transition-transform mb-0.5 mr-0.5">
              <i class="ph-fill ph-paper-plane-tilt text-lg"></i>
            </button>
          </div>
        </div>
      </section>

    </main>

  </div>

  <!-- FLOATING ACTION BUTTON (Upload - Mobile Only) -->
  <label id="fab-upload" for="picker-mobile"
    class="md:hidden fixed z-40 right-4 bottom-[calc(80px+var(--safe-area-bottom))] w-14 h-14 bg-blue-600 text-white rounded-full shadow-[0_8px_30px_rgb(37,99,235,0.4)] flex items-center justify-center text-2xl active:scale-90 transition-transform cursor-pointer">
    <i class="ph ph-plus"></i>
    <input id="picker-mobile" type="file" multiple class="hidden" onchange="upload(this)" />
  </label>

  <!-- BOTTOM NAVIGATION (Mobile Only) -->
  <nav
    class="md:hidden fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl border-t border-slate-200/50 z-50 pb-[var(--safe-area-bottom)]">
    <div class="flex px-2 py-1">
      <button onclick="switchTab('files')" id="nav-files"
        class="flex-1 flex flex-col items-center justify-center py-2 text-blue-600 transition-colors">
        <div class="px-5 py-1 rounded-full bg-blue-100 mb-1 transition-colors nav-indicator">
          <i class="ph-fill ph-folder text-xl"></i>
        </div>
        <span class="text-[10px] font-semibold">Tệp tin</span>
      </button>
      <button onclick="switchTab('clipboard')" id="nav-clipboard"
        class="flex-1 flex flex-col items-center justify-center py-2 text-slate-500 transition-colors">
        <div class="px-5 py-1 rounded-full bg-transparent mb-1 transition-colors nav-indicator">
          <i class="ph ph-clipboard-text text-xl"></i>
        </div>
        <span class="text-[10px] font-medium">Bảng tạm</span>
      </button>
    </div>
  </nav>

  <!-- MODAL XEM TRƯỚC (Full screen on mobile) -->
  <div id="preview-modal"
    class="fixed inset-0 z-[100] hidden flex-col bg-black/95 md:bg-slate-900/80 backdrop-blur-sm transition-opacity opacity-0"
    onclick="if(event.target===this)closePreviewModal()">
    <div
      class="bg-white md:rounded-2xl shadow-2xl w-full h-full md:h-[90vh] md:max-w-5xl md:m-auto flex flex-col overflow-hidden modal-slide-up">
      <!-- Header Preview -->
      <div
        class="flex items-center justify-between p-3 md:p-4 border-b border-slate-200 bg-white shrink-0 pt-[var(--safe-area-top)] md:pt-4">
        <div class="flex items-center gap-3 overflow-hidden flex-1">
          <button onclick="closePreviewModal()"
            class="w-10 h-10 flex items-center justify-center bg-slate-100 text-slate-700 rounded-full active:scale-90 transition-transform md:hidden">
            <i class="ph ph-caret-left text-xl"></i>
          </button>
          <h3 id="preview-title" class="text-base font-bold text-slate-800 truncate"></h3>
        </div>
        <div class="flex items-center gap-2 pl-2">
          <a id="preview-download-btn" href="#"
            class="h-10 px-4 bg-blue-50 text-blue-600 font-bold text-sm rounded-full flex items-center justify-center gap-2 active:scale-95 transition-transform">
            <i class="ph ph-download-simple text-lg"></i> <span class="hidden sm:inline">Tải về</span>
          </a>
          <button onclick="closePreviewModal()"
            class="hidden md:flex w-10 h-10 items-center justify-center bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full transition-colors">
            <i class="ph ph-x text-xl"></i>
          </button>
        </div>
      </div>
      <!-- Content Preview -->
      <div id="preview-body"
        class="flex-1 bg-slate-100 overflow-auto flex items-center justify-center p-0 md:p-6 relative pb-[var(--safe-area-bottom)] md:pb-6">
      </div>
    </div>
  </div>

  <!-- MODAL XÓA (Bottom Sheet on Mobile) -->
  <div id="delete-modal"
    class="fixed inset-0 z-[110] hidden flex items-end md:items-center justify-center bg-slate-900/40 backdrop-blur-sm transition-opacity opacity-0 p-0 md:p-4"
    onclick="if(event.target===this)closeDeleteModal()">
    <div
      class="bg-white rounded-t-3xl md:rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden modal-slide-up pb-[var(--safe-area-bottom)] md:pb-0">
      <div class="p-6 md:p-8 flex flex-col items-center">
        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mb-5">
          <i class="ph-fill ph-warning-circle text-3xl text-red-600"></i>
        </div>
        <h3 class="text-xl font-bold text-slate-900 mb-2">Xác nhận xóa</h3>
        <p id="delete-message" class="text-sm text-center text-slate-500 mb-2">Bạn có chắc chắn muốn xóa?</p>
        <p id="delete-filename"
          class="text-sm font-semibold text-center text-slate-800 line-clamp-2 bg-slate-50 p-2 rounded-lg w-full"></p>
      </div>
      <div class="p-4 flex gap-3 border-t border-slate-100 bg-slate-50/50">
        <button onclick="closeDeleteModal()"
          class="flex-1 py-3.5 rounded-xl font-semibold text-slate-600 bg-white border border-slate-200 active:scale-95 transition-transform">Hủy</button>
        <button onclick="executeDelete()"
          class="flex-1 py-3.5 rounded-xl font-semibold text-white bg-red-600 active:scale-95 transition-transform shadow-md shadow-red-500/20">Xóa
          ngay</button>
      </div>
    </div>
  </div>

  <!-- MODAL TẠO THƯ MỤC -->
  <div id="folder-modal"
    class="fixed inset-0 z-[110] hidden flex items-end md:items-center justify-center bg-slate-900/40 backdrop-blur-sm transition-opacity opacity-0 p-0 md:p-4"
    onclick="if(event.target===this)closeFolderModal()">
    <div
      class="bg-white rounded-t-3xl md:rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden modal-slide-up pb-[var(--safe-area-bottom)] md:pb-0">
      <div class="p-6 md:p-8 flex flex-col items-center">
        <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mb-5">
          <i class="ph ph-folder-plus text-3xl text-amber-600"></i>
        </div>
        <h3 class="text-xl font-bold text-slate-900 mb-4">Tạo thư mục mới</h3>
        <input id="folder-name-input" type="text" placeholder="Tên thư mục..."
          class="w-full px-4 py-3 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-amber-500/50 transition-all text-sm font-medium text-slate-800 placeholder:text-slate-400"
          onkeydown="if(event.key==='Enter'){event.preventDefault();executeFolderCreate()}" />
      </div>
      <div class="p-4 flex gap-3 border-t border-slate-100 bg-slate-50/50">
        <button onclick="closeFolderModal()"
          class="flex-1 py-3.5 rounded-xl font-semibold text-slate-600 bg-white border border-slate-200 active:scale-95 transition-transform">Hủy</button>
        <button onclick="executeFolderCreate()"
          class="flex-1 py-3.5 rounded-xl font-semibold text-white bg-amber-500 active:scale-95 transition-transform shadow-md shadow-amber-500/20">Tạo
          thư mục</button>
      </div>
    </div>
  </div>

  <script>
    // ─── UTILS ────────────────────────────────────────────────────────────────
    const $ = (id) => document.getElementById(id);
    const isLocalPreview = ['blob:', 'file:', 'data:'].includes(window.location.protocol);
    let _pinTimer = null;

    // ─── TABS MANAGEMENT (Mobile) ─────────────────────────────────────────────
    function switchTab(tabId) {
      if (window.innerWidth >= 768) return; // Desktop luôn hiện cả 2

      const isFiles = tabId === 'files';
      const tabFiles = $('tab-files');
      const tabClip = $('tab-clipboard');

      const fab = $('fab-upload');
      if (isFiles) {
        tabFiles.classList.remove('tab-hidden');
        tabClip.classList.remove('tab-active');
        if (fab) fab.style.display = '';
      } else {
        tabFiles.classList.add('tab-hidden');
        tabClip.classList.add('tab-active');
        if (fab) fab.style.display = 'none';
        // Scroll clipboard to bottom when opened
        setTimeout(() => {
          const list = $('clipboard-list');
          list.scrollTop = list.scrollHeight;
        }, 50);
      }

      // Update Nav UI
      const navF = $('nav-files');
      const navC = $('nav-clipboard');

      if (isFiles) {
        navF.classList.replace('text-slate-500', 'text-blue-600');
        navF.querySelector('.nav-indicator').classList.replace('bg-transparent', 'bg-blue-100');
        navF.querySelector('i').classList.replace('ph', 'ph-fill');

        navC.classList.replace('text-blue-600', 'text-slate-500');
        navC.querySelector('.nav-indicator').classList.replace('bg-blue-100', 'bg-transparent');
        navC.querySelector('i').classList.replace('ph-fill', 'ph');
      } else {
        navC.classList.replace('text-slate-500', 'text-blue-600');
        navC.querySelector('.nav-indicator').classList.replace('bg-transparent', 'bg-blue-100');
        navC.querySelector('i').classList.replace('ph', 'ph-fill');

        navF.classList.replace('text-blue-600', 'text-slate-500');
        navF.querySelector('.nav-indicator').classList.replace('bg-blue-100', 'bg-transparent');
        navF.querySelector('i').classList.replace('ph-fill', 'ph');
      }
    }

    // Xử lý resize để reset layout trên desktop/mobile
    window.addEventListener('resize', () => {
      const tabFiles = $('tab-files');
      const tabClip = $('tab-clipboard');
      if (window.innerWidth >= 768) {
        // Desktop: clear mobile-specific classes
        tabFiles.classList.remove('tab-hidden');
        tabClip.classList.remove('tab-active');
      } else {
        // Re-apply active tab state
        const isClipboardActive = $('nav-clipboard').classList.contains('text-blue-600');
        switchTab(isClipboardActive ? 'clipboard' : 'files');
      }
    });

    // ─── LAZY LOADER ─────────────────────────────────────────────────────────
    const _loaded = new Set();
    function lazyLoad(src) {
      if (_loaded.has(src)) return Promise.resolve();
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = () => { _loaded.add(src); resolve(); };
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    // ─── MOCK DATA ────────────────────────────────────────────────────────────
    let mockFiles = isLocalPreview ? [
      { name: "Thiết_kế_UI_App.png", size: 1048576, url: null },
      { name: "Báo_cáo_tài_chính_Q3.pdf", size: 5242880, url: null },
      { name: "Source_code_update.zip", size: 850000, url: null }
    ] : [];
    let mockClipboard = isLocalPreview ? [
      { id: 1, text: "Link Figma bản nháp:\nhttps://figma.com/file/...", timestamp: Date.now() - 300000 },
      { id: 2, text: "Mã màu xanh chủ đạo là #3B82F6 nhé", timestamp: Date.now() - 86400000 }
    ] : [];

    let currentFiles = [];
    let currentFolders = [];
    let selectedFiles = new Set();
    let currentFilesToDelete = [];
    let _pendingFolderDelete = null; // { folderName, fullPath }
    let lastEtag = null;
    let _refreshTimer = null;
    let _toastTimer = null;

    // ─── FOLDER NAVIGATION ────────────────────────────────────────────
    let currentDir = '';

    // Đọc dir từ URL hash khi mở trang
    function initDirFromHash() {
      const hash = location.hash.slice(1);
      const params = new URLSearchParams(hash);
      currentDir = params.get('dir') || '';
    }

    function updateHash() {
      if (currentDir) {
        location.hash = `dir=${encodeURIComponent(currentDir)}`;
      } else {
        history.replaceState(null, '', location.pathname + location.search);
      }
    }

    function navigateToDir(dir) {
      currentDir = dir;
      updateHash();
      lastEtag = null;
      selectedFiles.clear();
      refresh(true);
    }

    // Breadcrumb render
    function renderBreadcrumb() {
      const bar = $('breadcrumb-bar');
      const parts = currentDir ? currentDir.split('/').filter(Boolean) : [];

      let html = `<button onclick="navigateToDir('')" class="flex items-center gap-1 px-2 py-1 rounded-lg font-semibold transition-colors whitespace-nowrap ${!currentDir ? 'text-blue-600 bg-blue-50' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-100'}">
        <i class="ph-fill ph-house text-sm"></i> Gốc
      </button>`;

      let pathSoFar = '';
      for (let i = 0; i < parts.length; i++) {
        pathSoFar += (pathSoFar ? '/' : '') + parts[i];
        const isLast = i === parts.length - 1;
        const dirPath = pathSoFar;
        html += `<i class="ph ph-caret-right text-slate-300 text-xs shrink-0"></i>`;
        html += `<button onclick="navigateToDir('${dirPath.replace(/'/g, "\\'")}')" class="px-2 py-1 rounded-lg font-semibold transition-colors whitespace-nowrap ${isLast ? 'text-blue-600 bg-blue-50' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-100'}">
          <i class="ph-fill ph-folder text-sm"></i> ${parts[i]}
        </button>`;
      }

      bar.innerHTML = html;
    }

    // Tạo thư mục mới — mở modal
    function promptCreateFolder() {
      const modal = $('folder-modal');
      const input = $('folder-name-input');
      input.value = '';
      modal.classList.remove('hidden');
      requestAnimationFrame(() => modal.classList.remove('opacity-0'));
      setTimeout(() => input.focus(), 300);
    }

    function closeFolderModal() {
      const modal = $('folder-modal');
      modal.classList.add('opacity-0');
      setTimeout(() => modal.classList.add('hidden'), 200);
    }

    async function executeFolderCreate() {
      const name = $('folder-name-input').value;
      if (!name || !name.trim()) {
        $('folder-name-input').focus();
        return;
      }
      closeFolderModal();

      showStatus('Đang tạo thư mục...', 'loading');
      try {
        const res = await safeFetch('/api/folders', {
          method: 'POST',
          headers: { ...headers(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name.trim(), dir: currentDir })
        });
        if (res.ok) {
          const data = await res.json();
          showStatus(`Đã tạo thư mục "${data.name || name}"`, 'success');
          lastEtag = null;
          refresh(true);
        } else {
          const data = await res.json?.() || {};
          showStatus(data.error || 'Lỗi tạo thư mục', 'error');
        }
      } catch (e) {
        showStatus('Lỗi kết nối', 'error');
      }
    }

    // Xóa thư mục — mở modal xác nhận
    function deleteFolder(folderName) {
      const fullPath = currentDir ? `${currentDir}/${folderName}` : folderName;
      _pendingFolderDelete = { folderName, fullPath };
      currentFilesToDelete = [];
      $('delete-message').textContent = `Xóa thư mục và toàn bộ nội dung bên trong?`;
      $('delete-filename').textContent = folderName;
      const modal = $('delete-modal');
      modal.classList.remove('hidden');
      setTimeout(() => modal.classList.remove('opacity-0'), 10);
    }

    // Chia sẻ đường dẫn
    async function shareCurrentLink() {
      const url = window.location.origin + window.location.pathname + (currentDir ? `#dir=${encodeURIComponent(currentDir)}` : '');
      try {
        await navigator.clipboard.writeText(url);
        showStatus('Đã sao chép đường dẫn!', 'success');
      } catch {
        // Fallback
        const t = document.createElement('textarea');
        t.value = url;
        document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
        showStatus('Đã sao chép đường dẫn!', 'success');
      }
    }

    // Lắng nghe hash change (để back/forward hoạt động)
    window.addEventListener('hashchange', () => {
      initDirFromHash();
      lastEtag = null;
      selectedFiles.clear();
      refresh(true);
    });

    // ─── MOCK FETCH ───────────────────────────────────────────────────────────
    async function safeFetch(path, options = {}) {
      if (isLocalPreview) {
        await new Promise(r => setTimeout(r, path.includes('upload') ? 800 : 300));
        const clientPin = options.headers?.["X-PIN"];
        if (clientPin !== "1234") return { ok: false, status: 401 };
        if (path.startsWith("/api/files")) {
          if (options.method === "DELETE") {
            const fName = decodeURIComponent(path.split("/").pop());
            mockFiles = mockFiles.filter(f => f.name !== fName);
            return { ok: true };
          }
          return { ok: true, json: async () => ({ files: mockFiles }) };
        }
        if (path.startsWith("/api/upload") && options.method === "POST") {
          for (const file of (options.body?.getAll("files") ?? [])) {
            mockFiles.unshift({ name: file.name, size: file.size, url: URL.createObjectURL(file) });
          }
          return { ok: true };
        }
        if (path === "/api/clipboard" || path.startsWith("/api/clipboard/")) {
          if (options.method === "DELETE") {
            const delId = path.split('/').pop();
            mockClipboard = mockClipboard.filter(i => String(i.id) !== String(delId));
            return { ok: true, json: async () => ({ ok: true }) };
          }
          if (options.method === "POST") {
            const newItem = { id: Date.now(), text: JSON.parse(options.body).text, timestamp: Date.now() };
            mockClipboard.unshift(newItem);
            return { ok: true, json: async () => ({ item: newItem }) };
          }
          return { ok: true, json: async () => ({ ok: true, history: mockClipboard }) };
        }
        return { ok: false };
      }
      return fetch(path, options);
    }

    // ─── TOAST UI (Thay cho Status bar cũ) ────────────────────────────────────
    function showStatus(text, type = 'loading') {
      const container = $("toast-container");
      const toast = $("toast");
      const icon = $("toast-icon");
      const msg = $("toast-msg");

      clearTimeout(_toastTimer);

      if (!text) {
        container.classList.add('hidden');
        toast.classList.remove('toast-enter');
        return;
      }

      container.classList.remove('hidden');
      toast.classList.remove('bg-white', 'bg-red-50', 'bg-green-50', 'border-slate-100', 'border-red-200', 'border-green-200');
      icon.className = 'text-xl ';

      // Reset animation
      toast.classList.remove('toast-enter');
      void toast.offsetWidth; // trigger reflow
      toast.classList.add('toast-enter');

      if (type === 'loading') {
        toast.classList.add('bg-white', 'border-slate-100');
        icon.classList.add('ph', 'ph-spinner', 'animate-spin', 'text-blue-500');
        msg.className = 'flex-1 truncate text-slate-700';
      } else if (type === 'error') {
        toast.classList.add('bg-red-50', 'border-red-200');
        icon.classList.add('ph-fill', 'ph-warning-circle', 'text-red-500');
        msg.className = 'flex-1 truncate text-red-700 font-semibold';
      } else {
        toast.classList.add('bg-green-50', 'border-green-200');
        icon.classList.add('ph-fill', 'ph-check-circle', 'text-green-500');
        msg.className = 'flex-1 truncate text-green-700 font-semibold';
      }

      msg.textContent = text;

      if (type !== 'loading') {
        _toastTimer = setTimeout(() => {
          container.classList.add('hidden');
          toast.classList.remove('toast-enter');
        }, 3000);
      }
    }

    // ─── HEADERS & AUTH ───────────────────────────────────────────────────────
    function getStoredPin() { return localStorage.getItem("savedPin") || ""; }

    function headers() {
      const currentInput = $("pin").value.trim();
      const pin = currentInput || getStoredPin();
      return pin ? { "X-PIN": pin } : {};
    }

    function setAuthUI(isSuccess, usedPin) {
      const pinContainer = $("pin-container");
      const btnLogout = $("btn-logout-pin");
      const pinInput = $("pin");

      if (isSuccess && usedPin) {
        localStorage.setItem("savedPin", usedPin);
        pinInput.value = "";
        pinContainer.classList.add("hidden");
        btnLogout.classList.remove("hidden");
        btnLogout.classList.add("flex");
      } else if (!isSuccess) {
        localStorage.removeItem("savedPin");
        pinContainer.classList.remove("hidden");
        btnLogout.classList.add("hidden");
        btnLogout.classList.remove("flex");
      }
    }

    function logoutPin() {
      localStorage.removeItem("savedPin");
      $("pin-container").classList.remove("hidden");
      $("btn-logout-pin").classList.add("hidden");
      $("btn-logout-pin").classList.remove("flex");
      $("pin").focus();

      $("list").innerHTML = `
        <div class="px-6 py-20 text-center flex flex-col items-center">
          <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4">
            <i class="ph-fill ph-lock-key text-4xl text-slate-300"></i>
          </div>
          <p class="font-bold text-slate-700 text-lg">Đã khóa bảo mật</p>
          <p class="text-sm text-slate-500 mt-1">Nhập mã PIN để truy cập dữ liệu</p>
        </div>`;
      $("file-count").textContent = "0";
      currentFiles = [];
      updateSelectionUI();
    }

    // ─── FORMAT ───────────────────────────────────────────────────────────────
    function fmt(bytes) {
      const u = ["B", "KB", "MB", "GB"]; let i = 0, n = bytes;
      while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
      return `${n.toFixed(n >= 10 || i === 0 ? 0 : 1)} ${u[i]}`;
    }

    function fileProps(filename) {
      const ext = (filename.split(".").pop() || "").toLowerCase();
      const map = {
        pdf: { icon: "ph-file-pdf", color: "text-red-500", bg: "bg-red-50" },
        doc: { icon: "ph-file-doc", color: "text-blue-600", bg: "bg-blue-50" },
        docx: { icon: "ph-file-doc", color: "text-blue-600", bg: "bg-blue-50" },
        xls: { icon: "ph-file-xls", color: "text-green-600", bg: "bg-green-50" },
        xlsx: { icon: "ph-file-xls", color: "text-green-600", bg: "bg-green-50" },
        ppt: { icon: "ph-file-ppt", color: "text-orange-600", bg: "bg-orange-50" },
        pptx: { icon: "ph-file-ppt", color: "text-orange-600", bg: "bg-orange-50" },
        txt: { icon: "ph-file-text", color: "text-slate-600", bg: "bg-slate-100" },
        csv: { icon: "ph-file-csv", color: "text-green-600", bg: "bg-green-50" },
        png: { icon: "ph-image", color: "text-purple-500", bg: "bg-purple-50" },
        jpg: { icon: "ph-image", color: "text-purple-500", bg: "bg-purple-50" },
        jpeg: { icon: "ph-image", color: "text-purple-500", bg: "bg-purple-50" },
        webp: { icon: "ph-image", color: "text-purple-500", bg: "bg-purple-50" },
        gif: { icon: "ph-image", color: "text-purple-500", bg: "bg-purple-50" },
        svg: { icon: "ph-image", color: "text-purple-500", bg: "bg-purple-50" },
        bmp: { icon: "ph-image", color: "text-purple-500", bg: "bg-purple-50" },
        ico: { icon: "ph-image", color: "text-purple-500", bg: "bg-purple-50" },
        zip: { icon: "ph-file-archive", color: "text-orange-500", bg: "bg-orange-50" },
        rar: { icon: "ph-file-archive", color: "text-orange-500", bg: "bg-orange-50" },
        '7z': { icon: "ph-file-archive", color: "text-orange-500", bg: "bg-orange-50" },
        tar: { icon: "ph-file-archive", color: "text-orange-500", bg: "bg-orange-50" },
        gz: { icon: "ph-file-archive", color: "text-orange-500", bg: "bg-orange-50" },
        mp4: { icon: "ph-file-video", color: "text-pink-500", bg: "bg-pink-50" },
        webm: { icon: "ph-file-video", color: "text-pink-500", bg: "bg-pink-50" },
        avi: { icon: "ph-file-video", color: "text-pink-500", bg: "bg-pink-50" },
        mov: { icon: "ph-file-video", color: "text-pink-500", bg: "bg-pink-50" },
        mkv: { icon: "ph-file-video", color: "text-pink-500", bg: "bg-pink-50" },
        mp3: { icon: "ph-file-audio", color: "text-yellow-600", bg: "bg-yellow-50" },
        wav: { icon: "ph-file-audio", color: "text-yellow-600", bg: "bg-yellow-50" },
        ogg: { icon: "ph-file-audio", color: "text-yellow-600", bg: "bg-yellow-50" },
        flac: { icon: "ph-file-audio", color: "text-yellow-600", bg: "bg-yellow-50" },
        aac: { icon: "ph-file-audio", color: "text-yellow-600", bg: "bg-yellow-50" },
        m4a: { icon: "ph-file-audio", color: "text-yellow-600", bg: "bg-yellow-50" },
      };
      return map[ext] || { icon: "ph-file", color: "text-slate-500", bg: "bg-slate-100" };
    }

    // ─── FILE CATEGORY GROUPING ──────────────────────────────────────────
    const FILE_CATEGORIES = [
      {
        key: 'images',
        label: 'Hình ảnh',
        icon: 'ph-image',
        color: 'text-purple-500',
        bg: 'bg-purple-50',
        badgeBg: 'bg-purple-100',
        badgeText: 'text-purple-700',
        exts: new Set(['png', 'jpg', 'jpeg', 'webp', 'gif', 'svg', 'bmp', 'ico', 'tiff', 'tif'])
      },
      {
        key: 'documents',
        label: 'Tài liệu',
        icon: 'ph-file-text',
        color: 'text-blue-600',
        bg: 'bg-blue-50',
        badgeBg: 'bg-blue-100',
        badgeText: 'text-blue-700',
        exts: new Set(['pdf', 'doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx', 'txt', 'csv', 'rtf', 'odt', 'ods', 'json', 'xml', 'html', 'css', 'js', 'md'])
      },
      {
        key: 'videos',
        label: 'Video',
        icon: 'ph-file-video',
        color: 'text-pink-500',
        bg: 'bg-pink-50',
        badgeBg: 'bg-pink-100',
        badgeText: 'text-pink-700',
        exts: new Set(['mp4', 'webm', 'avi', 'mov', 'mkv', 'flv', 'wmv', '3gp'])
      },
      {
        key: 'audio',
        label: 'Âm thanh',
        icon: 'ph-file-audio',
        color: 'text-yellow-600',
        bg: 'bg-yellow-50',
        badgeBg: 'bg-yellow-100',
        badgeText: 'text-yellow-700',
        exts: new Set(['mp3', 'wav', 'ogg', 'flac', 'aac', 'wma', 'm4a', 'opus'])
      },
      {
        key: 'archives',
        label: 'Nén / Archive',
        icon: 'ph-file-archive',
        color: 'text-orange-500',
        bg: 'bg-orange-50',
        badgeBg: 'bg-orange-100',
        badgeText: 'text-orange-700',
        exts: new Set(['zip', 'rar', '7z', 'tar', 'gz', 'bz2', 'xz', 'iso'])
      },
      {
        key: 'other',
        label: 'Khác',
        icon: 'ph-file',
        color: 'text-slate-500',
        bg: 'bg-slate-100',
        badgeBg: 'bg-slate-200',
        badgeText: 'text-slate-600',
        exts: null // catch-all
      }
    ];

    // Trạng thái collapse cho mỗi nhóm (mặc định mở)
    const groupCollapsed = {};

    function getFileCategory(filename) {
      const ext = (filename.split('.').pop() || '').toLowerCase();
      for (const cat of FILE_CATEGORIES) {
        if (cat.exts && cat.exts.has(ext)) return cat;
      }
      return FILE_CATEGORIES[FILE_CATEGORIES.length - 1]; // 'other'
    }

    function toggleGroup(key) {
      groupCollapsed[key] = !groupCollapsed[key];
      const section = document.querySelector(`[data-group="${key}"]`);
      if (section) section.classList.toggle('group-collapsed', !!groupCollapsed[key]);
    }

    // ─── SELECTION UI ─────────────────────────────────────────────────
    function updateSelectionUI() {
      const hasSelected = selectedFiles.size > 0;

      // Toolbar bulk actions
      if (hasSelected) {
        $("table-actions").classList.remove("hidden");
        $("table-actions").classList.add("flex");
        $("selected-count").textContent = selectedFiles.size;
      } else {
        $("table-actions").classList.add("hidden");
        $("table-actions").classList.remove("flex");
      }

      // Desktop: select-all checkbox
      const cbAll = $("cb-select-all");
      if (cbAll) cbAll.checked = currentFiles.length > 0 && selectedFiles.size === currentFiles.length;

      // Update every rendered row: desktop checkbox + mobile circle
      document.querySelectorAll('.file-row[data-enc]').forEach(row => {
        const enc = row.dataset.enc;
        const isChecked = selectedFiles.has(enc);

        // Row highlight
        if (isChecked) row.classList.add('bg-blue-50/50');
        else row.classList.remove('bg-blue-50/50');

        // Desktop checkbox
        const cb = row.querySelector('.file-cb');
        if (cb) cb.checked = isChecked;

        // Mobile circle indicator
        const circle = row.querySelector('.mobile-circle');
        if (circle) {
          if (isChecked) {
            circle.className = 'mobile-circle w-6 h-6 rounded-full border-2 border-blue-500 bg-blue-500 flex items-center justify-center transition-all';
            circle.innerHTML = '<i class="ph-bold ph-check text-white text-xs"></i>';
          } else {
            circle.className = 'mobile-circle w-6 h-6 rounded-full border-2 border-slate-300 bg-white flex items-center justify-center transition-all';
            circle.innerHTML = '';
          }
        }
      });
    }

    function toggleSelect(encName, event) {
      if (event) event.stopPropagation();
      selectedFiles.has(encName) ? selectedFiles.delete(encName) : selectedFiles.add(encName);
      updateSelectionUI();
    }

    function toggleSelectAll() {
      if (selectedFiles.size === currentFiles.length && currentFiles.length > 0) {
        selectedFiles.clear();
      } else {
        currentFiles.forEach(f => selectedFiles.add(encodeURIComponent(f.name.normalize("NFC"))));
      }
      updateSelectionUI();
    }

    // ─── BUILD FILE ROW ──────────────────────────────────────────
    function buildRow(f) {
      const fileName = f.name.normalize("NFC");
      const props = fileProps(fileName);
      const encName = encodeURIComponent(fileName);
      const isChecked = selectedFiles.has(encName);
      const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';

      const div = document.createElement("div");
      div.dataset.enc = encName;

        <!-- Size (Desktop) -->
        <div class="hidden md:block w-24 text-right text-slate-500 text-sm font-medium">${fmt(f.size)}</div>

        <!-- Actions -->
        <div class="flex items-center gap-1 shrink-0 ml-2 md:w-32 md:justify-center">

          <!-- Mobile: circle tick -->

          <!-- Desktop: delete + download -->
          <button onclick="openDeleteModal('${encName}','${fileName.replace(/'/g, "\\'")}')" class="hidden md:flex w-9 h-9 items-center justify-center rounded-xl text-slate-400 hover:text-red-600 hover:bg-red-50 transition-colors" title="X\u00f3a">
            <i class="ph-fill ph-trash text-lg"></i>

    // ─── BUILD FOLDER ROW ─────────────────────────────────────────
    function buildFolderRow(folder) {
      const folderName = folder.name;
      const targetDir = currentDir ? `${currentDir}/${folderName}` : folderName;

      const div = document.createElement('div');
      div.className = 'folder-row group flex items-center p-3 md:px-6 md:py-4 hover:bg-amber-50/50 cursor-pointer transition-colors border-b border-slate-50 last:border-0';
      div.onclick = (e) => {
        if (e.target.closest('button')) return;
        navigateToDir(targetDir);
      };

      div.innerHTML = `
        <!-- Spacer for checkbox alignment (Desktop) -->
        <div class="hidden md:flex w-10 justify-center shrink-0"></div>

        <!-- Icon & Info -->
        <div class="flex-1 min-w-0 flex items-center gap-3 md:px-4">
          <div class="w-12 h-12 rounded-2xl bg-amber-50 flex items-center justify-center shrink-0">
            <i class="ph-fill ph-folder text-amber-500 text-2xl"></i>
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="font-semibold text-slate-800 text-sm md:text-base truncate pr-2 group-hover:text-amber-600 transition-colors">${folderName}</h3>
            <div class="flex items-center gap-2 mt-0.5 text-xs text-slate-400">
              <i class="ph ph-files text-xs"></i>
              <span>${folder.itemCount} mục</span>
            </div>
          </div>
        </div>

        <!-- Size placeholder (Desktop) -->
        <div class="hidden md:block w-24 text-right text-slate-400 text-sm font-medium">—</div>

        <!-- Actions -->
        <div class="flex items-center gap-1 shrink-0 ml-2 md:w-32 md:justify-center">
          <button onclick="event.stopPropagation(); deleteFolder('${folderName.replace(/'/g, "\\'")}')" class="w-9 h-9 flex items-center justify-center rounded-xl text-slate-300 hover:text-red-600 hover:bg-red-50 transition-colors" title="Xóa thư mục">
            <i class="ph ph-trash text-lg"></i>
          </button>
          <div class="w-9 h-9 flex items-center justify-center text-slate-300">
            <i class="ph ph-caret-right text-lg"></i>
          </div>
        </div>
      `;
      return div;
    }

    function renderFiles(files, folders = []) {
      const tb = $("list");

      if (files.length === 0 && folders.length === 0) {
        tb.innerHTML = `
        <div class="px-6 py-24 text-center flex flex-col items-center">
          <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mb-4">
            <i class="ph-fill ph-folder-open text-5xl text-blue-200"></i>
          </div>
          <p class="font-bold text-slate-700 text-lg">Th\u01b0 m\u1ee5c tr\u1ed1ng</p>
          <p class="text-sm text-slate-500 mt-1">B\u1ea5m n\u00fat (+) ho\u1eb7c t\u1ea1o th\u01b0 m\u1ee5c \u0111\u1ec3 b\u1eaft \u0111\u1ea7u</p>
        </div>`;
        return;
      }

      const frag = document.createDocumentFragment();

      // Render folders first
      if (folders.length > 0) {
        for (const folder of folders) {
          frag.appendChild(buildFolderRow(folder));
        }
      }

      // Nhóm file theo danh mục
      if (files.length > 0) {
        const groups = new Map();
        for (const cat of FILE_CATEGORIES) groups.set(cat.key, []);
        for (const f of files) {
          const cat = getFileCategory(f.name);
          groups.get(cat.key).push(f);
        }

        for (const cat of FILE_CATEGORIES) {
          const groupFiles = groups.get(cat.key);
          if (groupFiles.length === 0) continue;

          const totalSize = groupFiles.reduce((s, f) => s + (f.size || 0), 0);
          const isCollapsed = !!groupCollapsed[cat.key];

          const section = document.createElement('div');
          section.dataset.group = cat.key;
          section.className = isCollapsed ? 'group-collapsed' : '';

          const header = document.createElement('div');
          header.className = 'group-header';
          header.onclick = () => toggleGroup(cat.key);
          header.innerHTML = `
            <i class="group-chevron ph-bold ph-caret-down"></i>
            <div class="w-8 h-8 rounded-lg ${cat.bg} flex items-center justify-center shrink-0">
              <i class="ph-fill ${cat.icon} ${cat.color} text-lg"></i>
            </div>
            <span class="font-bold text-slate-700 text-sm">${cat.label}</span>
            <span class="text-[10px] font-bold ${cat.badgeBg} ${cat.badgeText} px-2 py-0.5 rounded-md">${groupFiles.length}</span>
            <span class="text-[11px] text-slate-400 font-medium ml-auto">${fmt(totalSize)}</span>
          `;
          section.appendChild(header);

          const body = document.createElement('div');
          body.className = 'group-body';
          for (const f of groupFiles) body.appendChild(buildRow(f));
          section.appendChild(body);

          frag.appendChild(section);
        }
      }

      tb.innerHTML = '';
      tb.appendChild(frag);
    }

    // ─── REFRESH ─────────────────────────────────────────────────────────────
    function debouncedRefresh() { clearTimeout(_refreshTimer); _refreshTimer = setTimeout(() => refresh(), 300); }

    async function refresh(force = false) {
      try {
        const reqHeaders = { ...headers() };
        const sentPin = reqHeaders["X-PIN"] || "";
        if (lastEtag && !force) reqHeaders["If-None-Match"] = lastEtag;

        const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
        const res = await safeFetch(`/api/files${dirParam}`, { headers: reqHeaders });
        if (res.status === 304) return;

        if (!res.ok) {
          setAuthUI(false);
          logoutPin();
          return;
        }

        setAuthUI(true, sentPin);
        const etag = res.headers?.get?.("ETag");
        if (etag) lastEtag = etag;

        const data = await res.json();
        currentFiles = data.files || [];
        currentFolders = data.folders || [];

        const encSet = new Set(currentFiles.map(f => encodeURIComponent(f.name.normalize("NFC"))));
        for (const enc of selectedFiles) { if (!encSet.has(enc)) selectedFiles.delete(enc); }

        $("file-count").textContent = currentFiles.length + currentFolders.length;
        updateSelectionUI();
        renderBreadcrumb();
        renderFiles(currentFiles, currentFolders);
        fetchClipboard();

      } catch (e) {
        console.error("Refresh error:", e);
      }
    }

    // ─── CLIPBOARD (Chat style UI) ───────────────────────────────────────────
    let clipboardHistory = [];

    function renderClipboardList() {
      const container = $("clipboard-list");
      if (!clipboardHistory || clipboardHistory.length === 0) {
        container.innerHTML = `<div class="text-center py-20 flex flex-col items-center opacity-50"><i class="ph-fill ph-chat-teardrop-text text-4xl mb-2"></i><span class="text-sm font-medium">Chưa có tin nhắn nào</span></div>`;
        return;
      }

      // Xếp tin nhắn cũ lên trên, mới xuống dưới (như chat)
      const sorted = [...clipboardHistory].sort((a, b) => a.timestamp - b.timestamp);

      container.innerHTML = sorted.map((item) => {
        const time = new Date(item.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const escText = item.text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

        // UI Chat Bubble (Gửi từ người khác/Chung -> Xám)
        return `
          <div id="cb-item-${item.id}" class="flex flex-col items-start w-full max-w-[90%] md:max-w-[85%] self-start modal-slide-up">
            <div class="bg-white border border-slate-200 text-slate-800 px-4 py-3 rounded-2xl rounded-tl-sm shadow-sm text-sm whitespace-pre-wrap break-words w-full font-medium leading-relaxed">${escText}</div>
            <div class="flex items-center gap-3 mt-1 px-1">
              <span class="text-[10px] text-slate-400 font-medium">${time}</span>
              <button onclick="copyClipboardItem('${item.id}', this)" class="text-[10px] font-bold text-blue-500 uppercase flex items-center gap-1 active:scale-90 transition-transform"><i class="ph-bold ph-copy"></i> Copy</button>
              <button onclick="deleteClipboardItem('${item.id}', this)" class="text-[10px] font-bold text-red-400 uppercase flex items-center gap-1 active:scale-90 transition-transform hover:text-red-600"><i class="ph-bold ph-trash"></i> Xóa</button>
            </div>
          </div>
        `;
      }).join("");

      // Auto scroll to bottom
      container.scrollTop = container.scrollHeight;
    }

    async function fetchClipboard() {
      try {
        const res = await safeFetch("/api/clipboard", { headers: headers() });
        if (!res.ok) return;
        const data = await res.json();
        if (data.ok && Array.isArray(data.history)) {
          clipboardHistory = data.history;
          renderClipboardList();
        }
      } catch (e) { }
    }

    async function saveClipboard() {
      const textarea = $("shared-clipboard");
      const text = textarea.value.trim();
      if (!text) return;

      textarea.value = "";
      handleClipboardInput(); // shrink

      // Phản hồi UI tức thì (Optimistic update)
      const tempId = 'temp-' + Date.now();
      clipboardHistory.push({ id: tempId, text: text, timestamp: Date.now() });
      renderClipboardList();

      try {
        const res = await safeFetch("/api/clipboard", {
          method: "POST",
          headers: { ...headers(), "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });
        if (res.ok) {
          const data = await res.json();
          // Cập nhật ID thật từ server (cả server thật lẫn local preview)
          const item = clipboardHistory.find(i => i.id === tempId);
          if (item && data.item?.id) {
            item.id = data.item.id;
            renderClipboardList(); // Re-render để button xóa dùng đúng ID
          }
        } else {
          showStatus("Lỗi gửi tin", "error");
          clipboardHistory = clipboardHistory.filter(i => i.id !== tempId);
          renderClipboardList();
        }
      } catch (e) {
        showStatus("Lỗi kết nối", "error");
      }
    }

    async function copyClipboardItem(id, btn) {
      const item = clipboardHistory.find(x => x.id == id);
      if (!item) return;

      const originalText = btn.innerHTML;
      try {
        await navigator.clipboard.writeText(item.text);
        btn.innerHTML = `<i class="ph-bold ph-check text-green-500"></i> <span class="text-green-500">Đã chép</span>`;
      } catch (e) {
        const t = document.createElement("textarea");
        t.value = item.text;
        document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t);
        btn.innerHTML = `<i class="ph-bold ph-check text-green-500"></i> <span class="text-green-500">Đã chép</span>`;
      }
      setTimeout(() => { btn.innerHTML = originalText; }, 1500);
    }

    async function deleteClipboardItem(id, btn) {
      // Inline confirm: lần 1 bấm → hiện xác nhận, lần 2 → xóa thật
      if (!btn._confirming) {
        btn._confirming = true;
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="ph-bold ph-check text-red-500"></i> Chắc?';
        btn.classList.add('text-red-600');
        setTimeout(() => {
          if (btn._confirming) {
            btn._confirming = false;
            btn.innerHTML = orig;
            btn.classList.remove('text-red-600');
          }
        }, 2500);
        return;
      }
      btn._confirming = false;

      try {
        const res = await safeFetch(`/api/clipboard/${id}`, { method: 'DELETE', headers: headers() });
        if (res.ok) {
          clipboardHistory = clipboardHistory.filter(x => String(x.id) !== String(id));
          const el = $(`cb-item-${id}`);
          if (el) {
            el.style.transition = 'opacity 0.2s, transform 0.2s';
            el.style.opacity = '0';
            el.style.transform = 'translateX(-20px)';
            setTimeout(() => el.remove(), 220);
          } else {
            renderClipboardList();
          }
        } else {
          showStatus('Không thể xóa', 'error');
        }
      } catch (e) {
        showStatus('Lỗi kết nối', 'error');
      }
    }

    function handleClipboardKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        saveClipboard();
      }
    }

    function handleClipboardInput() {
      const el = $("shared-clipboard");
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 120) + "px";
    }

    // ─── UPLOAD ──────────────────────────────────────────────────────────────
    async function upload(inputEl) {
      const files = inputEl.files;
      if (!files?.length) return;

      const fd = new FormData();
      for (const f of files) fd.append("files", new File([f], f.name.normalize("NFC"), { type: f.type }));

      showStatus(`Đang tải lên ${files.length} file...`, "loading");

      try {
        const pinVal = headers()["X-PIN"] || "";
        const params = new URLSearchParams();
        if (pinVal) params.set('pin', pinVal);
        if (currentDir) params.set('dir', currentDir);
        const qs = params.toString();
        const uploadUrl = `/api/upload${qs ? '?' + qs : ''}`;
        const res = await safeFetch(uploadUrl, { method: "POST", body: fd, headers: headers() });

        if (!res.ok) showStatus("Lỗi tải lên", "error");
        else {
          showStatus("Tải lên thành công!", "success");
          inputEl.value = "";
          lastEtag = null;
          refresh();
        }
      } catch (e) {
        showStatus("Mất kết nối", "error");
      }
    }

    // ─── MODALS PREVIEW & DELETE ──────────────────────────────────────────────
    function openPreviewModal(encName, fileName) {
      $("preview-title").textContent = fileName;

      const modal = $("preview-modal");
      modal.classList.remove("hidden");
      // Kích hoạt animation
      setTimeout(() => { modal.classList.remove("opacity-0"); }, 10);

      const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
      $("preview-download-btn").href = `/download/${encName}${dirParam}`;

      const pb = $("preview-body");
      pb.innerHTML = '<i class="ph ph-spinner animate-spin text-4xl text-blue-500"></i>';

      let actualUrl = `/download/${encName}${dirParam}`;
      const pin = headers()["X-PIN"] || "";
      if (pin) actualUrl += `${dirParam ? '&' : '?'}pin=${encodeURIComponent(pin)}`;

      if (isLocalPreview) {
        const mockF = mockFiles.find(f => encodeURIComponent(f.name.normalize("NFC")) === encName);
        if (mockF?.url) actualUrl = mockF.url;
        else { pb.innerHTML = '<p class="text-slate-500 font-medium">Không thể xem trước tệp ảo</p>'; return; }
      }

      const ext = fileName.split('.').pop().toLowerCase();
      const imageExts = ['png', 'jpg', 'jpeg', 'webp', 'gif', 'svg', 'bmp', 'ico', 'avif'];
      const videoExts = ['mp4', 'webm', 'mov', 'ogg', '3gp'];
      const audioExts = ['mp3', 'wav', 'ogg', 'flac', 'aac', 'm4a', 'opus', 'wma'];
      const textExts = ['txt', 'json', 'js', 'ts', 'jsx', 'tsx', 'css', 'html', 'htm', 'xml', 'csv', 'log', 'md', 'yaml', 'yml', 'toml', 'ini', 'cfg', 'conf', 'sh', 'bat', 'ps1', 'py', 'rb', 'java', 'c', 'cpp', 'h', 'go', 'rs', 'sql', 'env', 'gitignore', 'dockerfile'];

      if (imageExts.includes(ext)) {
        pb.innerHTML = `<img src="${actualUrl}" class="max-w-full max-h-full object-contain md:rounded-xl shadow-sm" onerror="this.parentElement.innerHTML='<p class=\\'text-slate-500 font-medium\\'>Không thể tải ảnh</p>'" />`;
      } else if (videoExts.includes(ext)) {
        pb.innerHTML = `<video src="${actualUrl}" controls autoplay class="w-full max-h-full bg-black md:rounded-xl"></video>`;
      } else if (audioExts.includes(ext)) {
        pb.innerHTML = `
          <div class="text-center p-8 bg-white rounded-3xl shadow-sm max-w-sm w-full">
            <div class="w-24 h-24 bg-yellow-50 rounded-full flex items-center justify-center mx-auto mb-5">
              <i class="ph-fill ph-music-notes text-5xl text-yellow-500"></i>
            </div>
            <p class="font-bold text-slate-800 text-lg mb-4">${fileName}</p>
            <audio src="${actualUrl}" controls autoplay class="w-full"></audio>
          </div>`;
      } else if (ext === 'pdf') {
        pb.innerHTML = `<iframe src="${actualUrl}" class="w-full h-full border-0 bg-white md:rounded-xl"></iframe>`;
      } else if (['doc', 'docx'].includes(ext)) {
        // Word preview via mammoth.js
        pb.innerHTML = '<i class="ph ph-spinner animate-spin text-4xl text-blue-500"></i>';
        fetch(actualUrl)
          .then(r => { if (!r.ok) throw new Error('Fetch failed'); return r.arrayBuffer(); })
          .then(buf => mammoth.convertToHtml({ arrayBuffer: buf }))
          .then(result => {
            pb.innerHTML = `
              <div class="w-full h-full overflow-auto bg-white md:rounded-xl">
                <div class="p-6 md:p-10 max-w-4xl mx-auto prose prose-slate prose-sm md:prose-base" style="font-family:'Times New Roman',serif;line-height:1.8">${result.value}</div>
              </div>`;
          })
          .catch(() => {
            pb.innerHTML = `
              <div class="text-center p-6 bg-white rounded-3xl shadow-sm max-w-sm w-full">
                <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4"><i class="ph-fill ph-file-doc text-4xl text-blue-500"></i></div>
                <p class="font-bold text-slate-800 text-lg mb-1">Không thể xem trước</p>
                <p class="text-sm text-slate-500 mb-6">Tải về để mở bằng MS Word hoặc WPS.</p>
                <a href="${actualUrl}" class="block w-full py-3 bg-blue-600 text-white font-bold rounded-xl active:scale-95 transition-transform">Tải xuống ngay</a>
              </div>`;
          });
      } else if (['xls', 'xlsx'].includes(ext)) {
        // Excel preview via SheetJS
        pb.innerHTML = '<i class="ph ph-spinner animate-spin text-4xl text-blue-500"></i>';
        fetch(actualUrl)
          .then(r => { if (!r.ok) throw new Error('Fetch failed'); return r.arrayBuffer(); })
          .then(buf => {
            const wb = XLSX.read(buf, { type: 'array' });
            let tabsHtml = '';
            let sheetsHtml = '';
            wb.SheetNames.forEach((name, idx) => {
              tabsHtml += `<button onclick="document.querySelectorAll('.xl-sheet').forEach(s=>s.classList.add('hidden'));document.getElementById('xl-sheet-${idx}').classList.remove('hidden');this.parentElement.querySelectorAll('button').forEach(b=>{b.classList.remove('bg-green-600','text-white');b.classList.add('bg-slate-100','text-slate-600')});this.classList.remove('bg-slate-100','text-slate-600');this.classList.add('bg-green-600','text-white')" class="px-4 py-2 rounded-lg text-sm font-semibold transition-colors whitespace-nowrap ${idx === 0 ? 'bg-green-600 text-white' : 'bg-slate-100 text-slate-600'}">${name}</button>`;
              const ws = wb.Sheets[name];
              const html = XLSX.utils.sheet_to_html(ws, { editable: false });
              sheetsHtml += `<div id="xl-sheet-${idx}" class="xl-sheet ${idx > 0 ? 'hidden' : ''}">${html}</div>`;
            });
            pb.innerHTML = `
              <div class="w-full h-full overflow-auto bg-white md:rounded-xl flex flex-col">
                <div class="flex gap-2 p-3 bg-slate-50 border-b border-slate-200 overflow-x-auto shrink-0 hide-scrollbar">${tabsHtml}</div>
                <div class="flex-1 overflow-auto p-2 xl-preview">${sheetsHtml}</div>
              </div>`;
          })
          .catch(() => {
            pb.innerHTML = `
              <div class="text-center p-6 bg-white rounded-3xl shadow-sm max-w-sm w-full">
                <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-4"><i class="ph-fill ph-file-xls text-4xl text-green-600"></i></div>
                <p class="font-bold text-slate-800 text-lg mb-1">Không thể xem trước</p>
                <p class="text-sm text-slate-500 mb-6">Tải về để mở bằng MS Excel hoặc WPS.</p>
                <a href="${actualUrl}" class="block w-full py-3 bg-green-600 text-white font-bold rounded-xl active:scale-95 transition-transform">Tải xuống ngay</a>
              </div>`;
          });
      } else if (['ppt', 'pptx'].includes(ext)) {
        pb.innerHTML = `
          <div class="text-center p-6 bg-white rounded-3xl shadow-sm max-w-sm w-full">
            <div class="w-20 h-20 bg-orange-50 rounded-full flex items-center justify-center mx-auto mb-4"><i class="ph-fill ph-file-ppt text-4xl text-orange-600"></i></div>
            <p class="font-bold text-slate-800 text-lg mb-1">Bản trình chiếu</p>
            <p class="text-sm text-slate-500 mb-6">Tải về để mở bằng MS PowerPoint hoặc WPS.</p>
            <a href="${actualUrl}" class="block w-full py-3 bg-orange-500 text-white font-bold rounded-xl active:scale-95 transition-transform">Tải xuống ngay</a>
          </div>`;
      } else if (textExts.includes(ext)) {
        pb.innerHTML = '<i class="ph ph-spinner animate-spin text-4xl text-blue-500"></i>';
        fetch(actualUrl)
          .then(r => { if (!r.ok) throw new Error('Fetch failed'); return r.text(); })
          .then(text => {
            const escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            pb.innerHTML = `
              <div class="w-full h-full overflow-auto bg-white md:rounded-xl">
                <pre class="p-4 md:p-6 text-sm font-mono text-slate-800 whitespace-pre-wrap break-words leading-relaxed"><code>${escaped}</code></pre>
              </div>`;
          })
          .catch(() => {
            pb.innerHTML = '<p class="text-slate-500 font-medium">Không thể đọc nội dung tệp</p>';
          });
      } else {
        pb.innerHTML = `
          <div class="text-center p-6 bg-white rounded-3xl shadow-sm max-w-sm w-full">
            <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4"><i class="ph-fill ph-file-dashed text-4xl text-slate-300"></i></div>
            <p class="font-bold text-slate-800 text-lg mb-1">Không có bản xem trước</p>
            <p class="text-sm text-slate-500 mb-6">Định dạng .${ext} cần được tải về máy để xem.</p>
            <a href="${actualUrl}" class="block w-full py-3 bg-blue-600 text-white font-bold rounded-xl active:scale-95 transition-transform">Tải xuống ngay</a>
          </div>`;
      }
    }

    function closePreviewModal() {
      const modal = $("preview-modal");
      modal.classList.add("opacity-0");
      setTimeout(() => { modal.classList.add("hidden"); $("preview-body").innerHTML = ""; }, 300);
    }

    function openDeleteModal(encName, fileName) {
      _pendingFolderDelete = null;
      currentFilesToDelete = [{ encName, name: fileName }];
      $('delete-message').textContent = 'Bạn có chắc chắn muốn xóa?';
      $("delete-filename").textContent = fileName;
      const modal = $("delete-modal");
      modal.classList.remove("hidden");
      setTimeout(() => { modal.classList.remove("opacity-0"); }, 10);
    }

    function openDeleteSelectedModal() {
      _pendingFolderDelete = null;
      currentFilesToDelete = Array.from(selectedFiles).map(encName => ({ encName }));
      $('delete-message').textContent = 'Bạn có chắc chắn muốn xóa?';
      $("delete-filename").textContent = `${currentFilesToDelete.length} tệp tin đã chọn`;
      const modal = $("delete-modal");
      modal.classList.remove("hidden");
      setTimeout(() => { modal.classList.remove("opacity-0"); }, 10);
    }

    function closeDeleteModal() {
      const modal = $("delete-modal");
      modal.classList.add("opacity-0");
      setTimeout(() => { modal.classList.add("hidden"); }, 300);
    }

    async function executeDelete() {
      closeDeleteModal();

      // Xóa thư mục
      if (_pendingFolderDelete) {
        const { folderName, fullPath } = _pendingFolderDelete;
        _pendingFolderDelete = null;
        showStatus('Đang xóa thư mục...', 'loading');
        try {
          const res = await safeFetch(`/api/folders?dir=${encodeURIComponent(fullPath)}`, {
            method: 'DELETE',
            headers: headers()
          });
          if (res.ok) {
            showStatus('Đã xóa thư mục', 'success');
            lastEtag = null;
            refresh(true);
          } else {
            showStatus('Lỗi xóa thư mục', 'error');
          }
        } catch (e) {
          showStatus('Lỗi kết nối', 'error');
        }
        return;
      }

      // Xóa file
      if (!currentFilesToDelete.length) return;
      showStatus("Đang xóa...", "loading");

      try {
        const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
        await Promise.all(currentFilesToDelete.map(f => safeFetch(`/api/files/${f.encName}${dirParam}`, { method: "DELETE", headers: headers() })));
        currentFilesToDelete.forEach(f => selectedFiles.delete(f.encName));
        showStatus("Đã xóa thành công", "success");
        lastEtag = null;
        refresh();
      } catch (e) {
        showStatus("Lỗi khi xóa", "error");
      }
    }

    async function downloadSelected() {
      const list = Array.from(selectedFiles);
      if (!list.length) return;
      showStatus(`Đang tải ${list.length} tệp...`, "loading");
      const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
      for (const encName of list) {
        const a = document.createElement('a');
        a.href = `/download/${encName}${dirParam}`;
        a.download = decodeURIComponent(encName);
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        await new Promise(r => setTimeout(r, 500)); // Tránh browser block popup
      }
      showStatus(`Hoàn tất yêu cầu tải`, "success");
    }

    // ─── INIT ─────────────────────────────────────────────────────────────────
    refresh();
    setInterval(() => debouncedRefresh(), 5000); // Fallback polling since SSE code was simplified for demo
  </script>
</body>

</html>
