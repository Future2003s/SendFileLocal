<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f0f4ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>LAN Share</title>

  <!-- Preconnect & Fonts -->
  <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/fill/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/bold/style.css">

  <!-- Office Preview Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <style>
    :root {
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
      --safe-area-top: env(safe-area-inset-top, 0px);
      --primary: #6366f1;
      --primary-light: #818cf8;
      --primary-dark: #4f46e5;
      --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(255, 255, 255, 0.3);
      --card-shadow: 0 1px 3px rgba(0, 0, 0, 0.04), 0 6px 24px rgba(0, 0, 0, 0.06);
      --card-shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.06), 0 12px 40px rgba(0, 0, 0, 0.1);
      --header-height: 64px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
      background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 30%, #f8fafc 60%, #f0fdf4 100%);
      background-attachment: fixed;
      min-height: 100dvh;
    }

    /* ─── HIDE SCROLLBAR ─── */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* ─── CUSTOM SCROLLBAR (Desktop) ─── */
    @media (min-width: 768px) {
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #c7d2fe;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #a5b4fc;
      }
    }

    /* ─── ANIMATIONS ─── */
    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes slideDownToast {
      from {
        transform: translate(-50%, -100%);
        opacity: 0;
      }

      to {
        transform: translate(-50%, 0);
        opacity: 1;
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4);
      }

      50% {
        box-shadow: 0 0 0 8px rgba(99, 102, 241, 0);
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes gradient-rotate {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes stagger-in {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-slide-up {
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .modal-fade-in {
      animation: fadeIn 0.2s ease-out forwards;
    }

    .toast-enter {
      animation: slideDownToast 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }

    /* Staggered list animation — use style="--i:N" on elements */
    .stagger-item {
      animation: stagger-in 0.4s ease-out both;
      animation-delay: calc(var(--i, 0) * 40ms);
    }

    /* Skeleton loading */
    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 37%, #f1f5f9 63%);
      background-size: 400% 100%;
      animation: shimmer 1.4s ease infinite;
      border-radius: 8px;
    }

    /* ─── TRUNCATE ─── */
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ─── GLASSMORPHISM CARDS ─── */
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px) saturate(1.8);
      -webkit-backdrop-filter: blur(20px) saturate(1.8);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: var(--card-shadow);
    }

    .glass-card-solid {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(226, 232, 240, 0.6);
      box-shadow: var(--card-shadow);
    }

    /* ─── HEADER ─── */
    .premium-header {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.03) 0%, rgba(139, 92, 246, 0.05) 50%, rgba(168, 85, 247, 0.03) 100%);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border-bottom: 1px solid rgba(99, 102, 241, 0.08);
      box-shadow: 0 1px 3px rgba(99, 102, 241, 0.04), 0 4px 20px rgba(99, 102, 241, 0.02);
    }

    .logo-icon {
      background: var(--accent-gradient);
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.35), 0 0 0 3px rgba(99, 102, 241, 0.08);
    }

    .logo-text {
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-badge {
      animation: pulse-glow 2s ease-in-out infinite;
    }

    /* ─── UPLOAD ZONE ─── */
    .upload-zone {
      position: relative;
      border: 2px dashed transparent;
      background-image:
        linear-gradient(white, white),
        linear-gradient(135deg, #c7d2fe, #ddd6fe, #e9d5ff, #c7d2fe);
      background-origin: border-box;
      background-clip: padding-box, border-box;
      background-size: 100% 100%, 300% 300%;
      animation: gradient-rotate 4s ease infinite;
      transition: all 0.3s ease;
    }

    .upload-zone:hover {
      background-image:
        linear-gradient(rgba(238, 242, 255, 0.8), rgba(238, 242, 255, 0.8)),
        linear-gradient(135deg, #818cf8, #a78bfa, #c084fc, #818cf8);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.12);
    }

    .upload-icon-container {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #eef2ff, #ede9fe);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 10px rgba(99, 102, 241, 0.1);
      transition: transform 0.3s ease;
    }

    .upload-zone:hover .upload-icon-container {
      transform: scale(1.1) translateY(-2px);
    }

    /* ─── FILE GROUP HEADERS ─── */
    .group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s ease;
      border-bottom: 1px solid #f1f5f9;
      position: relative;
    }

    .group-header::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 0;
      border-radius: 0 3px 3px 0;
      background: var(--accent-gradient);
      transition: height 0.2s ease;
    }

    .group-header:hover::before {
      height: 60%;
    }

    .group-header:hover {
      background-color: #fafbff;
    }

    .group-header:active {
      background-color: #f5f3ff;
    }

    @media (min-width: 768px) {
      .group-header {
        padding: 12px 24px;
      }
    }

    .group-chevron {
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      color: #a5b4fc;
      font-size: 16px;
      flex-shrink: 0;
    }

    .group-collapsed .group-chevron {
      transform: rotate(-90deg);
    }

    .group-body {
      max-height: 5000px;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
      opacity: 1;
    }

    .group-collapsed .group-body {
      max-height: 0 !important;
      opacity: 0;
    }

    /* ─── FILE ROW ENHANCEMENTS ─── */
    .file-row {
      position: relative;
      transition: all 0.2s ease;
    }

    .file-row::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent-gradient);
      border-radius: 0 3px 3px 0;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .file-row:hover::before {
      opacity: 1;
    }

    .file-row:hover {
      background: linear-gradient(90deg, rgba(238, 242, 255, 0.5) 0%, rgba(255, 255, 255, 0) 100%) !important;
      transform: translateX(2px);
    }

    /* ─── FOLDER ROW ENHANCEMENTS ─── */
    .folder-row {
      position: relative;
      transition: all 0.2s ease;
    }

    .folder-row::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, #f59e0b, #f97316);
      border-radius: 0 3px 3px 0;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .folder-row:hover::before {
      opacity: 1;
    }

    .folder-row:hover {
      background: linear-gradient(90deg, rgba(255, 251, 235, 0.6) 0%, rgba(255, 255, 255, 0) 100%) !important;
      transform: translateX(2px);
    }

    .folder-row.drag-over {
      background: linear-gradient(90deg, rgba(254, 243, 199, 0.8) 0%, rgba(255, 255, 255, 0.4) 100%) !important;
      outline: 2px dashed #f59e0b;
      outline-offset: -2px;
      border-radius: 8px;
    }

    .folder-row.drag-over .folder-drop-hint {
      display: flex !important;
    }

    /* Folder metadata badges */
    .folder-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .folder-meta-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 5px;
      white-space: nowrap;
    }


    .xl-preview table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
      font-size: 13px;
    }

    .xl-preview th,
    .xl-preview td {
      border: 1px solid #e2e8f0;
      padding: 6px 10px;
      text-align: left;
      white-space: nowrap;
    }

    .xl-preview tr:first-child td,
    .xl-preview tr:first-child th {
      background: linear-gradient(135deg, #eef2ff, #f5f3ff);
      font-weight: 600;
      color: #4338ca;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .xl-preview tr:nth-child(even) {
      background: #fafbff;
    }

    .xl-preview tr:hover {
      background: #eef2ff;
    }

    /* ─── LAYOUT ─── */
    .app-container {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-content {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    @media (max-width: 767px) {
      .main-content {
        position: relative;
      }

      #tab-files {
        position: absolute;
        inset: 0;
        overflow-y: auto;
        padding-bottom: calc(80px + var(--safe-area-bottom));
        display: flex;
        flex-direction: column;
      }

      #tab-files.tab-hidden {
        display: none !important;
      }

      #tab-clipboard {
        position: absolute;
        inset: 0;
        overflow: hidden;
        display: none;
        flex-direction: column;
      }

      #tab-clipboard.tab-active {
        display: flex !important;
      }
    }

    @media (min-width: 768px) {
      .main-content {
        overflow-y: auto;
        padding-bottom: 2rem;
      }
    }

    /* ─── SEARCH & SORT ─── */
    .search-sort-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(99, 102, 241, 0.06);
      background: linear-gradient(180deg, rgba(238, 242, 255, 0.3) 0%, rgba(255, 255, 255, 0) 100%);
    }

    @media (min-width: 768px) {
      .search-sort-bar {
        padding: 12px 24px;
      }
    }

    .search-input-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-input-wrapper i {
      position: absolute;
      left: 12px;
      color: #a5b4fc;
      font-size: 16px;
      pointer-events: none;
      transition: color 0.2s;
    }

    .search-input-wrapper input {
      width: 100%;
      padding: 9px 10px 9px 36px;
      border: 1.5px solid #e0e7ff;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      color: #334155;
      background: rgba(255, 255, 255, 0.8);
      transition: all 0.25s ease;
      outline: none;
      box-shadow: inset 0 1px 2px rgba(99, 102, 241, 0.04);
    }

    .search-input-wrapper input:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1), inset 0 1px 2px rgba(99, 102, 241, 0.04);
      background: white;
    }

    .search-input-wrapper input:focus+i,
    .search-input-wrapper:focus-within i {
      color: #6366f1;
    }

    .search-input-wrapper input::placeholder {
      color: #a5b4fc;
    }

    .search-clear-btn {
      position: absolute;
      right: 8px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #e0e7ff;
      border: none;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #6366f1;
      font-size: 11px;
      transition: all 0.15s;
    }

    .search-clear-btn:hover {
      background: #c7d2fe;
    }

    .search-clear-btn.visible {
      display: flex;
    }

    .sort-dropdown {
      position: relative;
    }

    .sort-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 9px 14px;
      border: 1.5px solid #e0e7ff;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #4338ca;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(99, 102, 241, 0.04);
    }

    .sort-btn:hover {
      background: #eef2ff;
      border-color: #c7d2fe;
    }

    .sort-btn i {
      font-size: 14px;
    }

    .sort-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 190px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(99, 102, 241, 0.1);
      border-radius: 14px;
      box-shadow: 0 10px 40px rgba(99, 102, 241, 0.12), 0 2px 8px rgba(0, 0, 0, 0.04);
      z-index: 50;
      padding: 4px;
      display: none;
      animation: fadeInScale 0.15s ease-out;
    }

    .sort-menu.open {
      display: block;
    }

    .sort-menu button {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 9px 12px;
      border: none;
      background: transparent;
      color: #475569;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.15s;
    }

    .sort-menu button:hover {
      background: #eef2ff;
      color: #4338ca;
    }

    .sort-menu button.active {
      background: linear-gradient(135deg, #eef2ff, #ede9fe);
      color: #4338ca;
      font-weight: 600;
    }

    .sort-menu button i {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    /* ─── NO RESULTS ─── */
    .no-results {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      color: #94a3b8;
    }

    .no-results i {
      font-size: 48px;
      margin-bottom: 12px;
      color: #c7d2fe;
    }

    .no-results p {
      font-size: 14px;
      font-weight: 600;
      color: #6366f1;
    }

    .no-results span {
      font-size: 12px;
      margin-top: 4px;
    }



    /* ─── PREMIUM BUTTONS ─── */
    .btn-premium {
      padding: 8px 16px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-premium:active {
      transform: scale(0.95);
    }

    .btn-primary {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:hover {
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
      transform: translateY(-1px);
    }

    /* ─── BOTTOM NAV PREMIUM ─── */
    .bottom-nav-item.active .nav-indicator {
      background: linear-gradient(135deg, #eef2ff, #ede9fe) !important;
    }

    .bottom-nav-item.active {
      color: #4338ca !important;
    }

    /* ─── FAB PREMIUM ─── */
    .fab-premium {
      background: var(--accent-gradient) !important;
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4), 0 0 0 4px rgba(99, 102, 241, 0.08) !important;
    }

    .fab-premium:hover {
      box-shadow: 0 12px 40px rgba(99, 102, 241, 0.5), 0 0 0 6px rgba(99, 102, 241, 0.12) !important;
    }
  </style>

</head>

<body class="text-slate-800 antialiased selection:bg-indigo-100 selection:text-indigo-900">

  <!-- TOAST NOTIFICATION (Nổi ở trên) -->
  <div id="toast-container"
    class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] hidden flex-col items-center gap-2 w-full max-w-[90%] md:max-w-sm pt-[var(--safe-area-top)]">
    <div id="toast"
      class="flex items-center gap-3 px-4 py-3 rounded-2xl shadow-lg font-medium text-sm w-full bg-white border border-slate-100 transition-all">
      <i id="toast-icon" class="ph ph-spinner animate-spin text-xl text-blue-500"></i>
      <span id="toast-msg" class="flex-1 truncate text-slate-700">Đang xử lý...</span>
    </div>
  </div>

  <div class="app-container max-w-5xl mx-auto md:p-6 md:gap-6">

    <!-- HEADER -->
    <header
      class="premium-header md:rounded-3xl p-4 md:px-6 md:py-4 flex items-center justify-between gap-4 z-40 sticky top-0 pt-[calc(1rem+var(--safe-area-top))] md:pt-4">
      <div class="flex items-center gap-2">
        <div class="w-10 h-10 logo-icon rounded-xl flex items-center justify-center text-white">
          <i class="ph-fill ph-hard-drives text-2xl"></i>
        </div>
        <h1 class="text-xl font-extrabold logo-text hidden sm:block">LAN Share</h1>
      </div>

      <!-- Auth Zone -->
      <div class="flex flex-1 md:flex-none justify-end items-center gap-2 max-w-xs ml-auto">
        <div class="relative w-full transition-all" id="pin-container">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="ph ph-lock-key text-slate-400"></i>
          </div>
          <input id="pin" type="password" placeholder="Mã PIN" inputmode="numeric"
            class="w-full pl-9 pr-3 py-2.5 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500/50 transition-all text-sm font-medium"
            onkeyup="if(event.key==='Enter') { lastEtag=null; refresh(true); }"
            oninput="clearTimeout(_pinTimer); _pinTimer=setTimeout(()=>{ lastEtag=null; refresh(true); }, 500)" />
        </div>

        <button id="btn-logout-pin" onclick="logoutPin()"

  <!-- FLOATING ACTION BUTTON (Upload - Mobile Only) -->

  <!-- BOTTOM NAVIGATION (Mobile Only) -->

    class="md:hidden fixed bottom-0 left-0 w-full bg-white/85 backdrop-blur-2xl border-t border-indigo-100/30 z-50 pb-[var(--safe-area-bottom)]">
    <div class="flex px-2 py-1">
      <button onclick="switchTab('files')" id="nav-files"
        class="flex-1 flex flex-col items-center justify-center py-2 text-indigo-600 transition-colors">

  <!-- MODAL XEM TRƯỚC (Full screen on mobile) -->

      class="bg-white md:rounded-2xl shadow-2xl w-full h-full md:h-[90vh] md:max-w-5xl md:m-auto flex flex-col overflow-hidden modal-slide-up">
      <!-- Header Preview -->

        class="flex items-center justify-between p-3 md:p-4 border-b border-slate-200 bg-white shrink-0 pt-[var(--safe-area-top)] md:pt-4">
        <div class="flex items-center gap-3 overflow-hidden flex-1">
          <button onclick="closePreviewModal()"
            class="w-10 h-10 flex items-center justify-center bg-slate-100 text-slate-700 rounded-full active:scale-90 transition-transform md:hidden">

            class="h-10 px-4 bg-indigo-50 text-indigo-600 font-bold text-sm rounded-full flex items-center justify-center gap-2 active:scale-95 transition-all hover:bg-indigo-100">
            <i class="ph ph-download-simple text-lg"></i> <span class="hidden sm:inline">Tải về</span>

            class="hidden md:flex w-10 h-10 items-center justify-center bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full transition-colors">

  <!-- MODAL XÓA (Bottom Sheet on Mobile) -->

    <div
      class="bg-white rounded-t-3xl md:rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden modal-slide-up pb-[var(--safe-area-bottom)] md:pb-0">

          <i class="ph-fill ph-warning-circle text-3xl text-red-600"></i>
        </div>
        <h3 class="text-xl font-bold text-slate-900 mb-2">Xác nhận xóa</h3>
        <p id="delete-message" class="text-sm text-center text-slate-500 mb-2">Bạn có chắc chắn muốn xóa?</p>

        <button onclick="executeDelete()"
          class="flex-1 py-3.5 rounded-xl font-semibold text-white bg-gradient-to-r from-rose-500 to-red-500 active:scale-95 transition-all shadow-lg shadow-rose-500/20 hover:shadow-rose-500/40">Xóa
          ngay</button>

  <!-- MODAL TẠO THƯ MỤC -->
  <div id="folder-modal"
    class="fixed inset-0 z-[110] hidden flex items-end md:items-center justify-center bg-slate-900/40 backdrop-blur-sm transition-opacity opacity-0 p-0 md:p-4"
    onclick="if(event.target===this)closeFolderModal()">
    <div
      class="bg-white rounded-t-3xl md:rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden modal-slide-up pb-[var(--safe-area-bottom)] md:pb-0">
      <div class="p-6 md:p-8 flex flex-col items-center">
        <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mb-5">
          <i class="ph ph-folder-plus text-3xl text-amber-600"></i>
        </div>
        <h3 class="text-xl font-bold text-slate-900 mb-4">Tạo thư mục mới</h3>
        <input id="folder-name-input" type="text" placeholder="Tên thư mục..."
          class="w-full px-4 py-3 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-amber-500/50 transition-all text-sm font-medium text-slate-800 placeholder:text-slate-400"
          onkeydown="if(event.key==='Enter'){event.preventDefault();executeFolderCreate()}" />
      </div>
      <div class="p-4 flex gap-3 border-t border-slate-100 bg-slate-50/50">
        <button onclick="closeFolderModal()"
          class="flex-1 py-3.5 rounded-xl font-semibold text-slate-600 bg-white border border-slate-200 active:scale-95 transition-transform">Hủy</button>
        <button onclick="executeFolderCreate()"
          class="flex-1 py-3.5 rounded-xl font-semibold text-white bg-gradient-to-r from-amber-400 to-orange-500 active:scale-95 transition-all shadow-lg shadow-amber-500/20 hover:shadow-amber-500/40">Tạo
          thư mục</button>
      </div>
    </div>
  </div>

  <script>
    // ─── UTILS ────────────────────────────────────────────────────────────────
    const $ = (id) => document.getElementById(id);
    const isLocalPreview = ['blob:', 'file:', 'data:'].includes(window.location.protocol);
    let _pinTimer = null;

    // ─── TABS MANAGEMENT (Mobile) ─────────────────────────────────────────────
    function switchTab(tabId) {
      if (window.innerWidth >= 768) return; // Desktop luôn hiện cả 2

      const isFiles = tabId === 'files';
      const tabFiles = $('tab-files');
      const tabClip = $('tab-clipboard');

      const fab = $('fab-upload');
      if (isFiles) {
        tabFiles.classList.remove('tab-hidden');
        tabClip.classList.remove('tab-active');
        if (fab) fab.style.display = '';
      } else {
        tabFiles.classList.add('tab-hidden');
        tabClip.classList.add('tab-active');
        if (fab) fab.style.display = 'none';
        // Scroll clipboard to bottom when opened
        setTimeout(() => {
          const list = $('clipboard-list');
          list.scrollTop = list.scrollHeight;
        }, 50);
      }

      // Update Nav UI
      const navF = $('nav-files');
      const navC = $('nav-clipboard');

      if (isFiles) {
        navF.classList.replace('text-slate-500', 'text-blue-600');
        navF.querySelector('.nav-indicator').classList.replace('bg-transparent', 'bg-blue-100');
        navF.querySelector('i').classList.replace('ph', 'ph-fill');

        navC.classList.replace('text-blue-600', 'text-slate-500');
        navC.querySelector('.nav-indicator').classList.replace('bg-blue-100', 'bg-transparent');
        navC.querySelector('i').classList.replace('ph-fill', 'ph');
      } else {
        navC.classList.replace('text-slate-500', 'text-blue-600');
        navC.querySelector('.nav-indicator').classList.replace('bg-transparent', 'bg-blue-100');
        navC.querySelector('i').classList.replace('ph', 'ph-fill');

        navF.classList.replace('text-blue-600', 'text-slate-500');
        navF.querySelector('.nav-indicator').classList.replace('bg-blue-100', 'bg-transparent');
        navF.querySelector('i').classList.replace('ph-fill', 'ph');
      }
    }

    // Xử lý resize để reset layout trên desktop/mobile
    window.addEventListener('resize', () => {
      const tabFiles = $('tab-files');
      const tabClip = $('tab-clipboard');
      if (window.innerWidth >= 768) {
        // Desktop: clear mobile-specific classes
        tabFiles.classList.remove('tab-hidden');
        tabClip.classList.remove('tab-active');
      } else {
        // Re-apply active tab state
        const isClipboardActive = $('nav-clipboard').classList.contains('text-blue-600');
        switchTab(isClipboardActive ? 'clipboard' : 'files');
      }
    });

    // ─── LAZY LOADER ─────────────────────────────────────────────────────────
    const _loaded = new Set();
    function lazyLoad(src) {
      if (_loaded.has(src)) return Promise.resolve();
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = () => { _loaded.add(src); resolve(); };
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    // ─── MOCK DATA ────────────────────────────────────────────────────────────
    let mockFiles = isLocalPreview ? [
      { name: "Thiết_kế_UI_App.png", size: 1048576, url: null },
      { name: "Báo_cáo_tài_chính_Q3.pdf", size: 5242880, url: null },
      { name: "Source_code_update.zip", size: 850000, url: null }
    ] : [];
    let mockClipboard = isLocalPreview ? [
      { id: 1, text: "Link Figma bản nháp:\nhttps://figma.com/file/...", timestamp: Date.now() - 300000 },
      { id: 2, text: "Mã màu xanh chủ đạo là #3B82F6 nhé", timestamp: Date.now() - 86400000 }
    ] : [];

    let currentFiles = [];
    let currentFolders = [];
    let selectedFiles = new Set();
    let currentFilesToDelete = [];
    let _pendingFolderDelete = null; // { folderName, fullPath }
    let lastEtag = null;
    let _refreshTimer = null;
    let _toastTimer = null;

    // ─── FOLDER NAVIGATION ────────────────────────────────────────────
    let currentDir = '';

    // Đọc dir từ URL hash khi mở trang
    function initDirFromHash() {
      const hash = location.hash.slice(1);
      const params = new URLSearchParams(hash);
      currentDir = params.get('dir') || '';
    }

    function updateHash() {
      if (currentDir) {
        location.hash = `dir=${encodeURIComponent(currentDir)}`;
      } else {
        history.replaceState(null, '', location.pathname + location.search);
      }
    }

    function navigateToDir(dir) {
      currentDir = dir;
      updateHash();
      lastEtag = null;
      selectedFiles.clear();
      refresh(true);
    }

    // Breadcrumb render
    function renderBreadcrumb() {
      const bar = $('breadcrumb-bar');
      const parts = currentDir ? currentDir.split('/').filter(Boolean) : [];

      let html = `<button onclick="navigateToDir('')" class="flex items-center gap-1 px-2 py-1 rounded-lg font-semibold transition-colors whitespace-nowrap ${!currentDir ? 'text-blue-600 bg-blue-50' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-100'}">
        <i class="ph-fill ph-house text-sm"></i> Gốc
      </button>`;

      let pathSoFar = '';
      for (let i = 0; i < parts.length; i++) {
        pathSoFar += (pathSoFar ? '/' : '') + parts[i];
        const isLast = i === parts.length - 1;
        const dirPath = pathSoFar;
        html += `<i class="ph ph-caret-right text-slate-300 text-xs shrink-0"></i>`;
        html += `<button onclick="navigateToDir('${dirPath.replace(/'/g, "\\'")}')" class="px-2 py-1 rounded-lg font-semibold transition-colors whitespace-nowrap ${isLast ? 'text-blue-600 bg-blue-50' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-100'}">
          <i class="ph-fill ph-folder text-sm"></i> ${parts[i]}
        </button>`;
      }

      bar.innerHTML = html;
    }

    // Tạo thư mục mới — mở modal
    function promptCreateFolder() {
      const modal = $('folder-modal');
      const input = $('folder-name-input');
      input.value = '';
      modal.classList.remove('hidden');
      requestAnimationFrame(() => modal.classList.remove('opacity-0'));
      setTimeout(() => input.focus(), 300);
    }

    function closeFolderModal() {
      const modal = $('folder-modal');
      modal.classList.add('opacity-0');
      setTimeout(() => modal.classList.add('hidden'), 200);
    }

    async function executeFolderCreate() {
      const name = $('folder-name-input').value;
      if (!name || !name.trim()) {
        $('folder-name-input').focus();
        return;
      }
      closeFolderModal();

      showStatus('Đang tạo thư mục...', 'loading');
      try {
        const res = await safeFetch('/api/folders', {
          method: 'POST',
          headers: { ...headers(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name.trim(), dir: currentDir })
        });
        if (res.ok) {
          const data = await res.json();
          showStatus(`Đã tạo thư mục "${data.name || name}"`, 'success');
          lastEtag = null;
          refresh(true);
        } else {
          const data = await res.json?.() || {};
          showStatus(data.error || 'Lỗi tạo thư mục', 'error');
        }
      } catch (e) {
        showStatus('Lỗi kết nối', 'error');
      }
    }

    // Xóa thư mục — mở modal xác nhận
    function deleteFolder(folderName) {
      const fullPath = currentDir ? `${currentDir}/${folderName}` : folderName;
      _pendingFolderDelete = { folderName, fullPath };
      currentFilesToDelete = [];

    // Chia sẻ đường dẫn
    async function shareCurrentLink() {
      const url = window.location.origin + window.location.pathname + (currentDir ? `#dir=${encodeURIComponent(currentDir)}` : '');
      try {
        await navigator.clipboard.writeText(url);
        showStatus('Đã sao chép đường dẫn!', 'success');
      } catch {
        // Fallback
        const t = document.createElement('textarea');
        t.value = url;

    // ─── MOCK FETCH ───────────────────────────────────────────────────────────
    async function safeFetch(path, options = {}) {
      if (isLocalPreview) {
        await new Promise(r => setTimeout(r, path.includes('upload') ? 800 : 300));
        const clientPin = options.headers?.["X-PIN"];
        if (clientPin !== "1234") return { ok: false, status: 401 };
        if (path.startsWith("/api/files")) {
          if (options.method === "DELETE") {
            const fName = decodeURIComponent(path.split("/").pop());
            mockFiles = mockFiles.filter(f => f.name !== fName);
            return { ok: true };
          }
          return { ok: true, json: async () => ({ files: mockFiles }) };
        }
        if (path.startsWith("/api/upload") && options.method === "POST") {
          for (const file of (options.body?.getAll("files") ?? [])) {
            mockFiles.unshift({ name: file.name, size: file.size, url: URL.createObjectURL(file) });
          }
          return { ok: true };
        }
        if (path === "/api/clipboard" || path.startsWith("/api/clipboard/")) {
          if (options.method === "DELETE") {
            const delId = path.split('/').pop();
            mockClipboard = mockClipboard.filter(i => String(i.id) !== String(delId));
            return { ok: true, json: async () => ({ ok: true }) };
          }
          if (options.method === "POST") {
            const newItem = { id: Date.now(), text: JSON.parse(options.body).text, timestamp: Date.now() };
            mockClipboard.unshift(newItem);
            return { ok: true, json: async () => ({ item: newItem }) };
          }
          return { ok: true, json: async () => ({ ok: true, history: mockClipboard }) };
        }
        return { ok: false };
      }
      return fetch(path, options);
    }

    // ─── TOAST UI (Thay cho Status bar cũ) ────────────────────────────────────
    function showStatus(text, type = 'loading') {
      const container = $("toast-container");
      const toast = $("toast");
      const icon = $("toast-icon");
      const msg = $("toast-msg");

      clearTimeout(_toastTimer);

      if (!text) {
        container.classList.add('hidden');
        toast.classList.remove('toast-enter');
        return;
      }

      container.classList.remove('hidden');
      toast.classList.remove('bg-white', 'bg-red-50', 'bg-green-50', 'border-slate-100', 'border-red-200', 'border-green-200');
      icon.className = 'text-xl ';

      // Reset animation
      toast.classList.remove('toast-enter');
      void toast.offsetWidth; // trigger reflow
      toast.classList.add('toast-enter');

      if (type === 'loading') {
        toast.classList.add('bg-white', 'border-slate-100');
        icon.classList.add('ph', 'ph-spinner', 'animate-spin', 'text-blue-500');
        msg.className = 'flex-1 truncate text-slate-700';
      } else if (type === 'error') {
        toast.classList.add('bg-red-50', 'border-red-200');
        icon.classList.add('ph-fill', 'ph-warning-circle', 'text-red-500');
        msg.className = 'flex-1 truncate text-red-700 font-semibold';
      } else {
        toast.classList.add('bg-green-50', 'border-green-200');
        icon.classList.add('ph-fill', 'ph-check-circle', 'text-green-500');
        msg.className = 'flex-1 truncate text-green-700 font-semibold';
      }

      msg.textContent = text;

      if (type !== 'loading') {
        _toastTimer = setTimeout(() => {
          container.classList.add('hidden');
          toast.classList.remove('toast-enter');
        }, 3000);
      }
    }

    // ─── FORMAT ───────────────────────────────────────────────────────────────
    function fmt(bytes) {
      const u = ["B", "KB", "MB", "GB"]; let i = 0, n = bytes;
      while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
      return `${n.toFixed(n >= 10 || i === 0 ? 0 : 1)} ${u[i]}`;
    }

      ['ph-file-pdf text-red-500 bg-red-50', 'pdf'],

      ['ph-file-csv text-green-600 bg-green-50', 'csv'],
      ['ph-file-ppt text-orange-600 bg-orange-50', 'ppt,pptx'],
      ['ph-file-text text-slate-600 bg-slate-100', 'txt'],
      ['ph-image text-purple-500 bg-purple-50', 'png,jpg,jpeg,webp,gif,svg,bmp,ico'],
      ['ph-file-archive text-orange-500 bg-orange-50', 'zip,rar,7z,tar,gz'],
      ['ph-file-video text-pink-500 bg-pink-50', 'mp4,webm,avi,mov,mkv'],

    // ─── SEARCH / SORT / FILTER ──────────────────────────────────────
    let currentSearchTerm = '';
    let currentSortMode = 'date-desc';
    let _searchTimer = null;

    function handleSearchInput() {
      clearTimeout(_searchTimer);
      const input = $('search-input');
      const clearBtn = $('search-clear');
      currentSearchTerm = input.value.trim().toLowerCase();
      clearBtn.classList.toggle('visible', input.value.length > 0);
      _searchTimer = setTimeout(() => {
        renderFiles(currentFiles, currentFolders);
      }, 150);

    function clearSearch() {
      $('search-input').value = '';
      currentSearchTerm = '';
      $('search-clear').classList.remove('visible');
      renderFiles(currentFiles, currentFolders);

    function toggleSortMenu(e) {
      e.stopPropagation();
      const menu = $('sort-menu');
      menu.classList.toggle('open');
      // Close on outside click
      if (menu.classList.contains('open')) {
        setTimeout(() => {
          document.addEventListener('click', closeSortMenu, { once: true });
        }, 0);
      }
    }

    function closeSortMenu() {
      $('sort-menu').classList.remove('open');
    }

    function setSort(mode) {
      currentSortMode = mode;
      closeSortMenu();
      // Update active state
      document.querySelectorAll('#sort-menu button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.sort === mode);
      });
      // Update label
      const labels = {
        'date-desc': 'Mới nhất', 'date-asc': 'Cũ nhất',
        'name-asc': 'Tên A→Z', 'name-desc': 'Tên Z→A',
        'size-desc': 'Lớn nhất', 'size-asc': 'Nhỏ nhất'
      };
      $('sort-label').textContent = labels[mode] || mode;
      renderFiles(currentFiles, currentFolders);
    }

    function sortFiles(files) {
      const sorted = [...files];
      switch (currentSortMode) {
        case 'date-desc': sorted.sort((a, b) => (b.mtime || 0) - (a.mtime || 0)); break;
        case 'date-asc': sorted.sort((a, b) => (a.mtime || 0) - (b.mtime || 0)); break;
        case 'name-asc': sorted.sort((a, b) => a.name.localeCompare(b.name)); break;
        case 'name-desc': sorted.sort((a, b) => b.name.localeCompare(a.name)); break;
        case 'size-desc': sorted.sort((a, b) => (b.size || 0) - (a.size || 0)); break;
        case 'size-asc': sorted.sort((a, b) => (a.size || 0) - (b.size || 0)); break;
      }
      return sorted;
    }

    // ─── SHARED UPLOAD ────────────────────────────────────────────────────
    async function doUpload(fileList, targetDir, inputEl) {
      const fd = new FormData();
      for (const f of fileList) fd.append('files', new File([f], f.name.normalize('NFC'), { type: f.type }));

      const dirLabel = targetDir || 'thư mục gốc';
      showStatus(`Đang tải ${fileList.length} file vào ${dirLabel}...`, 'loading');
      try {
        const pinVal = headers()['X-PIN'] || '';
        const params = new URLSearchParams();
        if (pinVal) params.set('pin', pinVal);
        if (targetDir) params.set('dir', targetDir);
        const qs = params.toString();
        const res = await safeFetch(`/api/upload${qs ? '?' + qs : ''}`, { method: 'POST', body: fd, headers: headers() });
        if (!res.ok) showStatus('Lỗi tải lên', 'error');
        else {
          showStatus(`Đã tải lên ${fileList.length} file thành công!`, 'success');
          if (inputEl) inputEl.value = '';
          lastEtag = null;
          refresh(true);
        }
      } catch (e) {
        showStatus('Mất kết nối', 'error');
      }
    }
    function uploadToFolder(fileList, targetDir) { return doUpload(fileList, targetDir); }

    function renderFiles(files, folders = []) {
      const tb = $("list");

      // Apply search filter
      let filteredFolders = folders;
      let filteredFiles = files;
      if (currentSearchTerm) {
        filteredFolders = folders.filter(f => f.name.toLowerCase().includes(currentSearchTerm));
        filteredFiles = files.filter(f => f.name.toLowerCase().includes(currentSearchTerm));
      }

      // Apply sorting to files
      filteredFiles = sortFiles(filteredFiles);

      // Sort folders by name (or totalSize if sorting by size)
      if (currentSortMode === 'size-desc') {
        filteredFolders = [...filteredFolders].sort((a, b) => (b.totalSize || 0) - (a.totalSize || 0));
      } else if (currentSortMode === 'size-asc') {
        filteredFolders = [...filteredFolders].sort((a, b) => (a.totalSize || 0) - (b.totalSize || 0));
      } else if (currentSortMode === 'name-desc') {
        filteredFolders = [...filteredFolders].sort((a, b) => b.name.localeCompare(a.name));
      }

      if (files.length === 0 && folders.length === 0) {
        tb.innerHTML = `
        <div class="px-6 py-24 text-center flex flex-col items-center">
          <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mb-4">
            <i class="ph-fill ph-folder-open text-5xl text-blue-200"></i>
          </div>
          <p class="font-bold text-slate-700 text-lg">Th\u01b0 m\u1ee5c tr\u1ed1ng</p>
          <p class="text-sm text-slate-500 mt-1">B\u1ea5m n\u00fat (+) ho\u1eb7c t\u1ea1o th\u01b0 m\u1ee5c \u0111\u1ec3 b\u1eaft \u0111\u1ea7u</p>
        </div>`;
        return;
      }

      // Search yielded no results
      if (currentSearchTerm && filteredFiles.length === 0 && filteredFolders.length === 0) {
        tb.innerHTML = `
        <div class="no-results">
          <i class="ph ph-magnifying-glass"></i>
          <p>Kh\u00f4ng t\u00ecm th\u1ea5y k\u1ebft qu\u1ea3</p>
          <span>Th\u1eed t\u00ecm v\u1edbi t\u1eeb kh\u00f3a kh\u00e1c</span>
        </div>`;
        return;
      }

      const frag = document.createDocumentFragment();

      // Render folders first
      if (filteredFolders.length > 0) {
        for (const folder of filteredFolders) {
          frag.appendChild(buildFolderRow(folder));
        }
      }

      // Group files by category
      if (filteredFiles.length > 0) {
        const groups = new Map();
        for (const cat of FILE_CATEGORIES) groups.set(cat.key, []);
        for (const f of filteredFiles) {
          const cat = getFileCategory(f.name);
          groups.get(cat.key).push(f);
        }

        for (const cat of FILE_CATEGORIES) {
          const groupFiles = groups.get(cat.key);
          if (groupFiles.length === 0) continue;

          const totalSize = groupFiles.reduce((s, f) => s + (f.size || 0), 0);
          const isCollapsed = !!groupCollapsed[cat.key];

          const section = document.createElement('div');
          section.dataset.group = cat.key;
          section.className = isCollapsed ? 'group-collapsed' : '';

          const header = document.createElement('div');
          header.className = 'group-header';
          header.onclick = () => toggleGroup(cat.key);
          header.innerHTML = `
            <i class="group-chevron ph-bold ph-caret-down"></i>
            <div class="w-8 h-8 rounded-lg ${cat.bg} flex items-center justify-center shrink-0">
              <i class="ph-fill ${cat.icon} ${cat.color} text-lg"></i>
            </div>
            <span class="font-bold text-slate-700 text-sm">${cat.label}</span>
            <span class="text-[10px] font-bold ${cat.badgeBg} ${cat.badgeText} px-2 py-0.5 rounded-md">${groupFiles.length}</span>
            <span class="text-[11px] text-slate-400 font-medium ml-auto">${fmt(totalSize)}</span>
          `;
          section.appendChild(header);

          const body = document.createElement('div');
          body.className = 'group-body';
          for (const f of groupFiles) body.appendChild(buildRow(f));
          section.appendChild(body);

          frag.appendChild(section);
        }
      }

      tb.innerHTML = '';
      tb.appendChild(frag);
    }


    // ─── REFRESH ─────────────────────────────────────────────────────────────
    function debouncedRefresh() { clearTimeout(_refreshTimer); _refreshTimer = setTimeout(() => refresh(), 300); }

    async function refresh(force = false) {
      try {
        const reqHeaders = { ...headers() };
        const sentPin = reqHeaders["X-PIN"] || "";
        if (lastEtag && !force) reqHeaders["If-None-Match"] = lastEtag;

        const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
        const res = await safeFetch(`/api/files${dirParam}`, { headers: reqHeaders });
        if (res.status === 304) return;

        if (!res.ok) {
          setAuthUI(false);
          logoutPin();
          return;
        }

        setAuthUI(true, sentPin);
        const etag = res.headers?.get?.("ETag");
        if (etag) lastEtag = etag;

        const data = await res.json();
        currentFiles = data.files || [];
        currentFolders = data.folders || [];

        const encSet = new Set(currentFiles.map(f => encodeURIComponent(f.name.normalize("NFC"))));
        for (const enc of selectedFiles) { if (!encSet.has(enc)) selectedFiles.delete(enc); }

        $("file-count").textContent = currentFiles.length + currentFolders.length;
        updateSelectionUI();
        renderBreadcrumb();
        renderFiles(currentFiles, currentFolders);
        fetchClipboard();

      } catch (e) {
        console.error("Refresh error:", e);
      }
    }

    // ─── CLIPBOARD (Chat style UI) ───────────────────────────────────────────
    let clipboardHistory = [];

    function renderClipboardList() {
      const container = $("clipboard-list");
      if (!clipboardHistory || clipboardHistory.length === 0) {
        container.innerHTML = `<div class="text-center py-20 flex flex-col items-center opacity-50"><i class="ph-fill ph-chat-teardrop-text text-4xl mb-2"></i><span class="text-sm font-medium">Chưa có tin nhắn nào</span></div>`;
        return;
      }

      // Xếp tin nhắn cũ lên trên, mới xuống dưới (như chat)
      const sorted = [...clipboardHistory].sort((a, b) => a.timestamp - b.timestamp);

      container.innerHTML = sorted.map((item) => {
        const time = new Date(item.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const escText = item.text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

        // UI Chat Bubble (Gửi từ người khác/Chung -> Xám)
        return `
          <div id="cb-item-${item.id}" class="flex flex-col items-start w-full max-w-[90%] md:max-w-[85%] self-start modal-slide-up">
            <div class="bg-white border border-slate-200 text-slate-800 px-4 py-3 rounded-2xl rounded-tl-sm shadow-sm text-sm whitespace-pre-wrap break-words w-full font-medium leading-relaxed">${escText}</div>
            <div class="flex items-center gap-3 mt-1 px-1">
              <span class="text-[10px] text-slate-400 font-medium">${time}</span>
              <button onclick="copyClipboardItem('${item.id}', this)" class="text-[10px] font-bold text-blue-500 uppercase flex items-center gap-1 active:scale-90 transition-transform"><i class="ph-bold ph-copy"></i> Copy</button>
              <button onclick="deleteClipboardItem('${item.id}', this)" class="text-[10px] font-bold text-red-400 uppercase flex items-center gap-1 active:scale-90 transition-transform hover:text-red-600"><i class="ph-bold ph-trash"></i> Xóa</button>
            </div>
          </div>
        `;
      }).join("");

      // Auto scroll to bottom
      container.scrollTop = container.scrollHeight;
    }

    async function fetchClipboard() {
      try {
        const res = await safeFetch("/api/clipboard", { headers: headers() });
        if (!res.ok) return;
        const data = await res.json();
        if (data.ok && Array.isArray(data.history)) {
          clipboardHistory = data.history;
          renderClipboardList();
        }
      } catch (e) { }
    }

    async function saveClipboard() {
      const textarea = $("shared-clipboard");
      const text = textarea.value.trim();
      if (!text) return;

      textarea.value = "";
      handleClipboardInput(); // shrink

      // Phản hồi UI tức thì (Optimistic update)
      const tempId = 'temp-' + Date.now();
      clipboardHistory.push({ id: tempId, text: text, timestamp: Date.now() });
      renderClipboardList();

      try {
        const res = await safeFetch("/api/clipboard", {
          method: "POST",
          headers: { ...headers(), "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });
        if (res.ok) {
          const data = await res.json();
          // Cập nhật ID thật từ server (cả server thật lẫn local preview)
          const item = clipboardHistory.find(i => i.id === tempId);
          if (item && data.item?.id) {
            item.id = data.item.id;
            renderClipboardList(); // Re-render để button xóa dùng đúng ID
          }
        } else {
          showStatus("Lỗi gửi tin", "error");
          clipboardHistory = clipboardHistory.filter(i => i.id !== tempId);
          renderClipboardList();
        }
      } catch (e) {
        showStatus("Lỗi kết nối", "error");
      }
    }

    async function copyClipboardItem(id, btn) {
      const item = clipboardHistory.find(x => x.id == id);
      if (!item) return;

      const originalText = btn.innerHTML;
      try {
        await navigator.clipboard.writeText(item.text);
        btn.innerHTML = `<i class="ph-bold ph-check text-green-500"></i> <span class="text-green-500">Đã chép</span>`;
      } catch (e) {
        const t = document.createElement("textarea");
        t.value = item.text;
        document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t);
        btn.innerHTML = `<i class="ph-bold ph-check text-green-500"></i> <span class="text-green-500">Đã chép</span>`;
      }
      setTimeout(() => { btn.innerHTML = originalText; }, 1500);
    }

    async function deleteClipboardItem(id, btn) {
      // Inline confirm: lần 1 bấm → hiện xác nhận, lần 2 → xóa thật
      if (!btn._confirming) {
        btn._confirming = true;
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="ph-bold ph-check text-red-500"></i> Chắc?';
        btn.classList.add('text-red-600');
        setTimeout(() => {
          if (btn._confirming) {
            btn._confirming = false;
            btn.innerHTML = orig;
            btn.classList.remove('text-red-600');
          }
        }, 2500);
        return;
      }
      btn._confirming = false;

      try {
        const res = await safeFetch(`/api/clipboard/${id}`, { method: 'DELETE', headers: headers() });
        if (res.ok) {
          clipboardHistory = clipboardHistory.filter(x => String(x.id) !== String(id));
          const el = $(`cb-item-${id}`);
          if (el) {
            el.style.transition = 'opacity 0.2s, transform 0.2s';
            el.style.opacity = '0';
            el.style.transform = 'translateX(-20px)';
            setTimeout(() => el.remove(), 220);
          } else {
            renderClipboardList();
          }
        } else {
          showStatus('Không thể xóa', 'error');
        }
      } catch (e) {
        showStatus('Lỗi kết nối', 'error');
      }
    }

    function handleClipboardKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        saveClipboard();
      }
    }

    function handleClipboardInput() {
      const el = $("shared-clipboard");
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 120) + "px";
    }

    async function executeDelete() {
      closeDeleteModal();

      // Xóa thư mục
      if (_pendingFolderDelete) {
        const { folderName, fullPath } = _pendingFolderDelete;
        _pendingFolderDelete = null;
        showStatus('Đang xóa thư mục...', 'loading');
        try {
          const res = await safeFetch(`/api/folders?dir=${encodeURIComponent(fullPath)}`, {
            method: 'DELETE',
            headers: headers()
          });
          if (res.ok) {
            showStatus('Đã xóa thư mục', 'success');
            lastEtag = null;
            refresh(true);
          } else {
            showStatus('Lỗi xóa thư mục', 'error');
          }
        } catch (e) {
          showStatus('Lỗi kết nối', 'error');
        }
        return;
      }

      // Xóa file
      if (!currentFilesToDelete.length) return;
      showStatus("Đang xóa...", "loading");

      try {
        const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
        await Promise.all(currentFilesToDelete.map(f => safeFetch(`/api/files/${f.encName}${dirParam}`, { method: "DELETE", headers: headers() })));
        currentFilesToDelete.forEach(f => selectedFiles.delete(f.encName));
        showStatus("Đã xóa thành công", "success");
        lastEtag = null;
        refresh();
      } catch (e) {
        showStatus("Lỗi khi xóa", "error");
      }
    }

    async function downloadSelected() {
      const list = Array.from(selectedFiles);
      if (!list.length) return;
      showStatus(`Đang tải ${list.length} tệp...`, "loading");
      const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
      for (const encName of list) {
        const a = document.createElement('a');
        a.href = `/download/${encName}${dirParam}`;
        a.download = decodeURIComponent(encName);
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        await new Promise(r => setTimeout(r, 500)); // Tránh browser block popup
      }
      showStatus(`Hoàn tất yêu cầu tải`, "success");
    }

    // ─── GLOBAL DRAG-DROP (upload to current directory) ─────────────────────
    (function setupGlobalDragDrop() {
      let dragCounter = 0;

      // Create overlay element
      const overlay = document.createElement('div');
      overlay.id = 'global-drop-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(99,102,241,0.08);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;pointer-events:none;transition:opacity 0.2s';
      overlay.innerHTML = '<div style="background:rgba(255,255,255,0.95);border:2px dashed #818cf8;border-radius:24px;padding:40px 60px;text-align:center;box-shadow:0 20px 60px rgba(99,102,241,0.15)">' +
        '<div style="width:64px;height:64px;background:linear-gradient(135deg,#eef2ff,#ede9fe);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">' +
        '<i class="ph ph-cloud-arrow-up" style="font-size:32px;color:#6366f1"></i></div>' +
        '<p id="drop-overlay-text" style="font-size:16px;font-weight:700;color:#4338ca;margin-bottom:4px"></p>' +
        '<p style="font-size:13px;color:#94a3b8">Thả file để tải lên</p></div>';
      document.body.appendChild(overlay);

      function updateOverlayText() {
        const el = document.getElementById('drop-overlay-text');
        if (el) el.textContent = currentDir ? 'Tải vào: ' + currentDir : 'Tải vào thư mục gốc';
      }

      document.addEventListener('dragenter', (e) => {
        e.preventDefault();
        // Ignore if dragging from folder rows (they handle their own)
        if (e.target.closest && e.target.closest('.folder-row')) return;
        dragCounter++;
        if (dragCounter === 1) {
          updateOverlayText();
          overlay.style.display = 'flex';
          overlay.style.opacity = '1';
          overlay.style.pointerEvents = 'auto';
        }
      });

      document.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
      });

      document.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dragCounter--;
        if (dragCounter <= 0) {
          dragCounter = 0;
          overlay.style.opacity = '0';
          setTimeout(() => { overlay.style.display = 'none'; overlay.style.pointerEvents = 'none'; }, 200);
        }
      });

      document.addEventListener('drop', (e) => {
        e.preventDefault();
        dragCounter = 0;
        overlay.style.opacity = '0';
        setTimeout(() => { overlay.style.display = 'none'; overlay.style.pointerEvents = 'none'; }, 200);

        // If dropped on a folder row, that handler takes care of it
        if (e.target.closest && e.target.closest('.folder-row')) return;

        const files = e.dataTransfer.files;
        if (files && files.length > 0) doUpload(files, currentDir);
      });
    })();

    // ─── INIT ─────────────────────────────────────────────────────────────────
    refresh();
    setInterval(() => debouncedRefresh(), 5000); // Fallback polling since SSE code was simplified for demo
  </script>
</body>
